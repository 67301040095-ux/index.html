<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Chiller System</title>
<style>
body { margin:0; overflow:hidden; background:#1e2228; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== Scene =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2228);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,3000);
camera.position.set(0,400,700);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// ===== Light =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(300,500,200);
scene.add(light);

// ===== Ground =====
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(1200,800),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);


// ============================
// CREATE COOLING TOWER
// ============================

function createCoolingTower(x,z){

const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(200,20,200),
new THREE.MeshStandardMaterial({color:0x555555})
);
base.position.y = 10;
group.add(base);

const tower = new THREE.Mesh(
new THREE.BoxGeometry(150,200,150),
new THREE.MeshStandardMaterial({color:0xcfd2d6})
);
tower.position.y = 120;
group.add(tower);

const frameGeo = new THREE.BoxGeometry(10,200,10);
const frameMat = new THREE.MeshStandardMaterial({color:0x666666});

[[75,120,75],[-75,120,75],[75,120,-75],[-75,120,-75]]
.forEach(p=>{
const f = new THREE.Mesh(frameGeo,frameMat);
f.position.set(p[0],p[1],p[2]);
group.add(f);
});

const deck = new THREE.Mesh(
new THREE.BoxGeometry(170,15,170),
new THREE.MeshStandardMaterial({color:0x888888})
);
deck.position.y = 225;
group.add(deck);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ============================
// CREATE AHU (NEW REALISTIC)
// ============================

function createAHU(x,z){

const group = new THREE.Group();

// ===== Base Frame (C-Channel) =====
const baseHeight = 15;
const baseMat = new THREE.MeshStandardMaterial({color:0x222222});

const baseLeft = new THREE.Mesh(
new THREE.BoxGeometry(260, baseHeight, 20),
baseMat
);
baseLeft.position.set(0, baseHeight/2, -50);
group.add(baseLeft);

const baseRight = baseLeft.clone();
baseRight.position.z = 50;
group.add(baseRight);

// ===== Main Body =====
const bodyHeight = 180;
const bodyLength = 260;
const bodyDepth = 120;

const body = new THREE.Mesh(
new THREE.BoxGeometry(bodyLength, bodyHeight, bodyDepth),
new THREE.MeshStandardMaterial({color:0xcfd4d9})
);
body.position.y = baseHeight + bodyHeight/2;
group.add(body);

// ===== Section Panel Lines =====
for(let i=-1;i<=1;i++){
const panel = new THREE.Mesh(
new THREE.BoxGeometry(4, bodyHeight-10, bodyDepth+2),
new THREE.MeshStandardMaterial({color:0xb0b6bc})
);
panel.position.set(i*85, baseHeight + bodyHeight/2, 0);
group.add(panel);
}

// ===== Return Air Duct (ซ้าย) =====
const returnDuct = new THREE.Mesh(
new THREE.BoxGeometry(70,70,70),
new THREE.MeshStandardMaterial({color:0x999999})
);
returnDuct.position.set(-bodyLength/2 -35, baseHeight + 120, 0);
group.add(returnDuct);

// ===== Supply Air Duct (ขวา) =====
const supplyDuct = new THREE.Mesh(
new THREE.BoxGeometry(90,90,90),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
);
supplyDuct.position.set(bodyLength/2 +45, baseHeight + 140, 0);
group.add(supplyDuct);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ============================
// CREATE BOX (CHILLER)
// ============================

function createBox(x,z,color,height=120,width=120,depth=120){
const box = new THREE.Mesh(
new THREE.BoxGeometry(width,height,depth),
new THREE.MeshStandardMaterial({color:color})
);
box.position.set(x,height/2,z);
scene.add(box);
return box;
}


// ============================
// CREATE PUMP
// ============================

function createPump(x,z){

const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(120,15,120),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
base.position.y = 7.5;
group.add(base);

const body = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,90,32),
new THREE.MeshStandardMaterial({color:0x0077ff})
);
body.position.y = 70;
group.add(body);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ===== Layout =====

const CT = createCoolingTower(-300,-200);
const CH = createBox(0,-100,0x888888,160,160,160);
const AHU = createAHU(300,-200);

const CDP = createPump(-300,0);
const CHP = createPump(300,0);


// ===== Animate =====
function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
