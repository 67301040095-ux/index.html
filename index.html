<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Chiller SCADA</title>

<style>
body{
margin:0;
overflow:hidden;
background:#1e2228;
font-family:Arial;
}

#panel{
position:absolute;
top:20px;
left:20px;
background:#ffffffcc;
padding:10px;
border-radius:6px;
}

button{
padding:6px 12px;
margin:4px;
}
</style>
</head>

<body>

<div id="panel">

<button onclick="startAuto()">START</button>
<button onclick="stopAuto()">STOP</button>

<br><br>

Temp :
<input id="temp" type="range" min="35" max="60" value="44" step="1"
oninput="updateTemp(this.value)">

<span id="tempValue">44°F</span>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2228);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,3000);
camera.position.set(0,350,650);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff,0.7));

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(200,400,200);
scene.add(light);

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(2000,2000),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);



/* COOLING TOWER */

let ctFan;

function createCT(x,z){

const g = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(120,180,120),
new THREE.MeshStandardMaterial({color:0xcfd2d6})
);

body.position.y = 90;
g.add(body);

ctFan = new THREE.Mesh(
new THREE.BoxGeometry(10,4,70),
new THREE.MeshStandardMaterial({color:0x222222})
);

ctFan.position.y = 180;
g.add(ctFan);

g.position.set(x,0,z);
scene.add(g);

}


/* PUMP */

function createPump(x,z){

const g = new THREE.Group();

const base = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,80,32),
new THREE.MeshStandardMaterial({color:0x0077ff})
);

base.position.y = 40;
g.add(base);

g.position.set(x,0,z);
scene.add(g);

return g;

}


/* CHILLER */

let chillerBody;

function createChiller(x,z){

const g = new THREE.Group();

chillerBody = new THREE.Mesh(
new THREE.BoxGeometry(250,120,120),
new THREE.MeshStandardMaterial({color:0x0b3d2e})
);

chillerBody.position.y = 60;
g.add(chillerBody);

g.position.set(x,0,z);
scene.add(g);

}


/* AHU */

let ahuFan;

function createAHU(x,z){

const g = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(200,100,100),
new THREE.MeshStandardMaterial({color:0xdedede})
);

body.position.y = 60;
g.add(body);

ahuFan = new THREE.Mesh(
new THREE.BoxGeometry(8,4,60),
new THREE.MeshStandardMaterial({color:0x222222})
);

ahuFan.position.y = 60;
g.add(ahuFan);

g.position.set(x,0,z);
scene.add(g);

}



/* LAYOUT */

createCT(-350,-200);

const CDP = createPump(-150,-50);

createChiller(0,0);

const CHP = createPump(150,80);

createAHU(350,200);



/* SYSTEM STATE */

let startTime=null;

let pumpOn=false;
let ctOn=false;
let chillerOn=false;
let ahuOn=false;

let temperature = 44;
const designTemp = 44;


/* BUTTON */

function startAuto(){
startTime = Date.now();
}

function stopAuto(){
startTime=null;

pumpOn=false;
ctOn=false;
chillerOn=false;
ahuOn=false;
}



/* TEMP */

function updateTemp(v){

temperature=v;
document.getElementById("tempValue").innerText=v+"°F";

}



/* AUTO LOGIC */

function updateSystem(){

if(!startTime) return;

let t = (Date.now()-startTime)/1000;

if(t>3){

pumpOn=true;

}

if(t>8){

ctOn=true;
ahuOn=true;

}

if(t>13){

if(temperature>=designTemp){

chillerOn=true;

}else{

chillerOn=false;

}

}

}



/* ANIMATION */

function animate(){

requestAnimationFrame(animate);

controls.update();

updateSystem();

if(ctOn){

ctFan.rotation.y +=0.2;

}

if(ahuOn){

ahuFan.rotation.y +=0.3;

}

if(chillerOn){

chillerBody.material.color.set(0x00ffcc);

}else{

chillerBody.material.color.set(0x0b3d2e);

}

renderer.render(scene,camera);

}

animate();

</script>
</body>
</html>
