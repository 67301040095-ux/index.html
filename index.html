<!DOCTYPE html>
<html>
<head>
<title>Chiller SCADA</title>

<style>
body{
margin:0;
background:#111;
color:white;
font-family:Arial;
}

#ui{
position:absolute;
top:20px;
left:20px;
z-index:10;
}

button{
padding:10px;
font-size:16px;
margin-right:10px;
}

#temp{
width:200px;
}
</style>

</head>

<body>

<div id="ui">

<button onclick="startSystem()">START</button>
<button onclick="stopSystem()">STOP</button>

<br><br>

Temp :
<input type="range" id="temp" min="35" max="60" value="44"
oninput="updateTemp(this.value)">
<span id="tempValue">44°F</span>

<br><br>

<div id="status">SYSTEM READY</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

camera.position.set(0,6,12);
camera.lookAt(0,0,0);


const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));



const floor = new THREE.Mesh(
new THREE.PlaneGeometry(30,30),
new THREE.MeshStandardMaterial({color:0xeeeeee})
);

floor.rotation.x = -Math.PI/2;

scene.add(floor);



function createBox(color,x,z){

const mesh = new THREE.Mesh(

new THREE.BoxGeometry(1.5,1.5,1.5),

new THREE.MeshStandardMaterial({color:color})

);

mesh.position.set(x,0.75,z);

scene.add(mesh);

return mesh;

}


function createCylinder(color,x,z){

const mesh = new THREE.Mesh(

new THREE.CylinderGeometry(0.6,0.6,1.5,32),

new THREE.MeshStandardMaterial({color:color})

);

mesh.position.set(x,0.75,z);

scene.add(mesh);

return mesh;

}



const AHU = createBox(0xffffff,0,5);

const CHP = createCylinder(0x2196f3,0,2.5);

const CH = createBox(0x2e7d32,0,0);

const CDP = createCylinder(0x2196f3,0,-2.5);

const CT = createBox(0xffffff,0,-5);



let running = false;



function startSystem(){

running = true;

document.getElementById("status").innerHTML = "SYSTEM RUNNING";

}


function stopSystem(){

running = false;

document.getElementById("status").innerHTML = "SYSTEM STOP";

}



function updateTemp(v){

document.getElementById("tempValue").innerHTML = v+"°F";

if(v < 44){

document.getElementById("status").innerHTML = "CHILLER DOWN";

running = false;

}

}



function animate(){

requestAnimationFrame(animate);

if(running){

CH.rotation.y += 0.02;

CHP.rotation.y += 0.1;

CDP.rotation.y += 0.1;

CT.rotation.y += 0.01;

AHU.rotation.y += 0.01;

}

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
