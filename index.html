<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHILLER SYSTEM 3D</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
}

#ui{
position:absolute;
top:20px;
left:20px;
z-index:10;
}

button{
padding:10px 20px;
font-size:16px;
margin-right:10px;
cursor:pointer;
}
</style>

</head>

<body>

<div id="ui">
<button onclick="startSystem()">START</button>
<button onclick="stopSystem()">STOP</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

let systemRun = false;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(10,8,12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera,renderer.domElement);


// LIGHT
const ambient = new THREE.AmbientLight(0xffffff,0.8);
scene.add(ambient);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);


// GROUND
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(30,30),
new THREE.MeshStandardMaterial({color:0xcccccc})
);

ground.rotation.x = -Math.PI/2;
scene.add(ground);


// ----------------------
// CT (Cooling Tower)
// ----------------------

const CT = new THREE.Group();

// ฐาน
const base = new THREE.Mesh(
new THREE.BoxGeometry(3,0.6,3),
new THREE.MeshStandardMaterial({color:0x777777})
);
base.position.y = 0.3;
CT.add(base);


// ส่วนล่าง
const lower = new THREE.Mesh(
new THREE.BoxGeometry(2.5,2.5,2.5),
new THREE.MeshStandardMaterial({color:0x999999})
);
lower.position.y = 1.8;
CT.add(lower);


// louver
for(let i=0;i<5;i++){

const louver = new THREE.Mesh(
new THREE.BoxGeometry(2.6,0.1,0.2),
new THREE.MeshStandardMaterial({color:0xdddddd})
);

louver.position.set(0,1+(i*0.3),1.3);

CT.add(louver);

}


// ส่วนบน
const upper = new THREE.Mesh(
new THREE.BoxGeometry(3,2.5,3),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
);

upper.position.y = 4.3;
CT.add(upper);


// ฝาบน
const topCap = new THREE.Mesh(
new THREE.CylinderGeometry(1.6,1.6,0.4,32),
new THREE.MeshStandardMaterial({color:0x444444})
);

topCap.position.y = 5.8;
CT.add(topCap);


// ----------------------
// FAN
// ----------------------

const fan = new THREE.Group();
fan.position.y = 6;

const hub = new THREE.Mesh(
new THREE.CylinderGeometry(0.15,0.15,0.4,16),
new THREE.MeshStandardMaterial({color:0x222222})
);

hub.rotation.z = Math.PI/2;
fan.add(hub);


// blades
for(let i=0;i<4;i++){

const blade = new THREE.Mesh(
new THREE.BoxGeometry(1.6,0.15,0.1),
new THREE.MeshStandardMaterial({color:0x333333})
);

blade.rotation.y = i*(Math.PI/2);

fan.add(blade);

}

CT.add(fan);


// position
CT.position.set(0,0,10);
scene.add(CT);


// ----------------------
// CDP
// ----------------------

const CDP = new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.7,2,32),
new THREE.MeshStandardMaterial({color:0x111111})
);

CDP.position.set(1,1,6);
scene.add(CDP);


// ----------------------
// CH
// ----------------------

const CH = new THREE.Mesh(
new THREE.BoxGeometry(4,2,2),
new THREE.MeshStandardMaterial({color:0xffcc00})
);

CH.position.set(0,1,0);
scene.add(CH);


// ----------------------
// CHP
// ----------------------

const CHP = new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.7,2,32),
new THREE.MeshStandardMaterial({color:0x111111})
);

CHP.position.set(1,1,-6);
scene.add(CHP);


// ----------------------
// AHU
// ----------------------

const AHU = new THREE.Mesh(
new THREE.BoxGeometry(3,1.5,2),
new THREE.MeshStandardMaterial({color:0xff3333})
);

AHU.position.set(0,1,-10);
scene.add(AHU);


// ----------------------
// PIPE
// ----------------------

function pipe(x,z1,z2,color){

const length = Math.abs(z2-z1);

const pipe = new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,length,16),
new THREE.MeshStandardMaterial({color:color})
);

pipe.rotation.x = Math.PI/2;

pipe.position.set(x,1,(z1+z2)/2);

scene.add(pipe);

}


// SUPPLY
pipe(-1,10,6,0xff0000);
pipe(-1,6,0,0xff0000);
pipe(-1,0,-6,0xff0000);
pipe(-1,-6,-10,0xff0000);


// RETURN
pipe(1,-10,-6,0x00ffff);
pipe(1,-6,0,0x00ffff);
pipe(1,0,6,0x00ffff);
pipe(1,6,10,0x00ffff);


// ----------------------
// SYSTEM CONTROL
// ----------------------

function startSystem(){

systemRun = true;

}

function stopSystem(){

systemRun = false;

}


// ----------------------
// ANIMATE
// ----------------------

function animate(){

requestAnimationFrame(animate);

controls.update();

if(systemRun){

fan.rotation.y += 0.3;

}

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
