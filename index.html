<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Model Layout</title>
<style>
body{margin:0;overflow:hidden;background:#1e2228;}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== Scene =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2228);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,3000);
camera.position.set(0,400,700);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// ===== Lights =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(300,500,200);
scene.add(light);

// ===== Ground =====
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(1200,800),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== Function สร้างกล่อง =====
function createBox(x,z,color,height=120,width=120,depth=120){

const geometry = new THREE.BoxGeometry(width,height,depth);
const material = new THREE.MeshStandardMaterial({color:color});
const box = new THREE.Mesh(geometry,material);

box.position.set(x,height/2,z);
scene.add(box);

return box;
}

// ===== Layout ตำแหน่งเดิม =====

// ซ้าย (CT)
const CT = createBox(-300,-200,0x444444,140,140,140);

// กลาง (CH)
const CH = createBox(0,-100,0x888888,160,160,160);

// ขวา (AHU)
const AHU = createBox(300,-200,0xddddcc,120,200,120);

// ล่างซ้าย (CDP)
const CDP = createBox(-300,0,0x000000,80,120,120);

// ล่างขวา (CHP)
const CHP = createBox(300,0,0x000000,80,120,120);

// ===== Render Loop =====
function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
