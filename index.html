<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HVAC System - Full Layout</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbfdfff);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.set(900,600,900);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff,0.4));

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(500,800,500);
scene.add(light);

// Ground
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({color:0xdddddd})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ---------- FUNCTIONS ----------

function pipe(x,y,z,length,color,rotateZ=true){
const mesh = new THREE.Mesh(
new THREE.CylinderGeometry(18,18,length,16),
new THREE.MeshStandardMaterial({color:color})
);
if(rotateZ) mesh.rotation.z = Math.PI/2;
mesh.position.set(x,y,z);
scene.add(mesh);
}

function pump(x,z,color){
const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.CylinderGeometry(60,60,40,32),
new THREE.MeshStandardMaterial({color:0x333333})
);
base.position.y = 20;
group.add(base);

const body = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,140,32),
new THREE.MeshStandardMaterial({color:color})
);
body.position.y = 110;
group.add(body);

group.position.set(x,0,z);
scene.add(group);
}

function boxEquip(x,z,w,h,d,color){
const mesh = new THREE.Mesh(
new THREE.BoxGeometry(w,h,d),
new THREE.MeshStandardMaterial({color:color})
);
mesh.position.set(x,h/2,z);
scene.add(mesh);
return mesh;
}

// ---------- EQUIPMENT ----------

// CT
const ct = boxEquip(-700,0,250,300,250,0x666666);

// CT Fan
const fanGroup = new THREE.Group();
const fanBase = new THREE.Mesh(
new THREE.CylinderGeometry(80,80,15,32),
new THREE.MeshStandardMaterial({color:0x222222})
);
fanBase.position.y = 310;
fanGroup.add(fanBase);

for(let i=0;i<4;i++){
const blade = new THREE.Mesh(
new THREE.BoxGeometry(150,10,25),
new THREE.MeshStandardMaterial({color:0xffffff})
);
blade.position.y = 320;
blade.rotation.y = i*(Math.PI/2);
fanGroup.add(blade);
}
fanGroup.position.set(-700,0,0);
scene.add(fanGroup);

// CHILLER
boxEquip(0,0,350,200,200,0x999999);

// AHU
boxEquip(800,0,300,200,200,0x777777);

// CDP (Red - Condenser Pump)
pump(-400,-150,0xff0000);
pump(-400,150,0xaa0000);

// CHP (Blue - Chilled Pump)
pump(300,-150,0x0066ff);
pump(300,150,0x0033aa);

// ---------- PIPING ----------

// 🔴 Condenser Loop (Red)
pipe(-550,150,0,300,0xff0000); // CT → CDP
pipe(-200,150,0,400,0xff0000); // CDP → CH
pipe(-550,120,0,300,0xaa0000); // Return
pipe(-200,120,0,400,0xaa0000);

// 🔵 Chilled Loop (Blue)
pipe(150,150,0,400,0x0066ff); // CH → CHP
pipe(550,150,0,400,0x0066ff); // CHP → AHU
pipe(150,120,0,400,0x0033aa); // Return
pipe(550,120,0,400,0x0033aa);

// ---------- ANIMATE ----------
function animate(){
requestAnimationFrame(animate);
controls.update();
fanGroup.rotation.y += 0.08;
renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
