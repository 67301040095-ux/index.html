<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Chiller SCADA</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
overflow:hidden;
}

#panel{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:10px;
}

button{
margin:3px;
padding:6px 12px;
}

#alarm{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div id="panel">

<button onclick="startSystem()">START</button>
<button onclick="stopSystem()">STOP</button>

<br><br>

Temperature  
<input id="temp" type="range" min="35" max="60" value="44">
<span id="tempValue">44°F</span>

<br><br>

<div id="alarm"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script>

let running=false

const scene=new THREE.Scene()
scene.background=new THREE.Color(0x202020)

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,4,120)
amera.lookAt(0,2,0)
  
const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls=new THREE.OrbitControls(camera,renderer.domElement)

const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(10,10,10)
scene.add(light)

const amb=new THREE.AmbientLight(0x666666)
scene.add(amb)

function box(w,h,d,color){
const g=new THREE.BoxGeometry(w,h,d)
const m=new THREE.MeshStandardMaterial({color:color})
return new THREE.Mesh(g,m)
}

function cyl(r,h,color){
const g=new THREE.CylinderGeometry(r,r,h,32)
const m=new THREE.MeshStandardMaterial({color:color})
return new THREE.Mesh(g,m)
}

function pipe(length,color){
const g=new THREE.CylinderGeometry(0.1,0.1,length,16)
const m=new THREE.MeshStandardMaterial({color:color})
return new THREE.Mesh(g,m)
}

function fan(size,color){
const g=new THREE.BoxGeometry(size,0.1,size)
const m=new THREE.MeshStandardMaterial({color:color})
return new THREE.Mesh(g,m)
}

function impeller(){
const g=new THREE.BoxGeometry(0.5,0.1,0.2)
const m=new THREE.MeshStandardMaterial({color:0xffffff})
return new THREE.Mesh(g,m)
}

const CT=box(2,1.5,2,0xdddddd)
CT.position.y=5
scene.add(CT)

const CTfan=fan(1.5,0x333333)
CTfan.position.y=5.8
scene.add(CTfan)

const CDP=cyl(0.5,1,0x0066ff)
CDP.position.y=3.5
scene.add(CDP)

const CDPimp=impeller()
CDPimp.position.set(0,3.5,0)
scene.add(CDPimp)

const CH=box(2.5,1.5,2,0x00aa88)
CH.position.y=2
scene.add(CH)

const CHP=cyl(0.5,1,0x0066ff)
CHP.position.y=0.5
scene.add(CHP)

const CHPimp=impeller()
CHPimp.position.set(0,0.5,0)
scene.add(CHPimp)

const AHU=box(2,1.2,2,0x888888)
AHU.position.y=-1
scene.add(AHU)

const AHUfan=fan(1.5,0x333333)
AHUfan.position.y=-0.4
scene.add(AHUfan)

function makePipe(y1,y2,x,color){

const len=Math.abs(y2-y1)

const p=pipe(len,color)

p.rotation.z=Math.PI/2
p.position.set(x,(y1+y2)/2,0)

scene.add(p)

}

makePipe(5,3.5,-1,0xff6600)
makePipe(3.5,2,-1,0xff6600)
makePipe(2,5,-1,0xff6600)

makePipe(2,0.5,1,0x00ffff)
makePipe(0.5,-1,1,0x00ffff)
makePipe(-1,2,1,0x00ffff)

const particles=[]
const particleGeo=new THREE.SphereGeometry(0.07,8,8)
const particleMat=new THREE.MeshBasicMaterial({color:0xffffff})

for(let i=0;i<30;i++){

const p=new THREE.Mesh(particleGeo,particleMat)

p.position.set(-1,Math.random()*5,0)

scene.add(p)

particles.push(p)

}

function startSystem(){
running=true
}

function stopSystem(){
running=false
document.getElementById("alarm").innerHTML=""
}

const temp=document.getElementById("temp")
const tempValue=document.getElementById("tempValue")

temp.oninput=function(){

tempValue.innerHTML=this.value+"°F"

if(this.value<44){

running=false
document.getElementById("alarm").innerHTML="🚨 CHILLER SHUTDOWN"

}

}

function animate(){

requestAnimationFrame(animate)

if(running){

CTfan.rotation.y+=0.2
AHUfan.rotation.y+=0.2

CDPimp.rotation.y+=0.3
CHPimp.rotation.y+=0.3

particles.forEach(p=>{

p.position.y-=0.05

if(p.position.y<0){
p.position.y=5
}

})

}

controls.update()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
