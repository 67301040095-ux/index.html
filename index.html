<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Chiller System</title>
<style>
body { margin:0; overflow:hidden; background:#1e2228; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== Scene =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2228);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,3000);
camera.position.set(0,400,700);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// ===== Light =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(300,500,200);
scene.add(light);

// ===== Ground =====
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(1200,800),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);


// ============================
// CREATE COOLING TOWER
// ============================

function createCoolingTower(x,z){

const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(200,20,200),
new THREE.MeshStandardMaterial({color:0x555555})
);
base.position.y = 10;
group.add(base);

const tower = new THREE.Mesh(
new THREE.BoxGeometry(150,200,150),
new THREE.MeshStandardMaterial({color:0xcfd2d6})
);
tower.position.y = 120;
group.add(tower);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ============================
// CREATE VERTICAL PUMP
// ============================

function createPump(x,z){

const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(120,15,120),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
base.position.y = 7.5;
group.add(base);

const body = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,90,32),
new THREE.MeshStandardMaterial({color:0x0077ff})
);
body.position.y = 70;
group.add(body);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ============================
// CREATE AHU
// ============================

function createAHU(x,z){

const group = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(220,140,120),
new THREE.MeshStandardMaterial({color:0xdedede})
);
body.position.y = 130;
group.add(body);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ============================
// CREATE CHILLER (เพิ่มอย่างเดียว)
// ============================

function createChiller(x,z){

const group = new THREE.Group();
group.scale.set(0.7,0.7,0.7);

// Lower Tank
const tankMat = new THREE.MeshStandardMaterial({color:0x0b3d91});

const lowerTank = new THREE.Mesh(
new THREE.CylinderGeometry(70,70,300,32),
tankMat
);
lowerTank.rotation.z = Math.PI/2;
lowerTank.position.y = 80;
group.add(lowerTank);

// Upper Tank
const upperTank = lowerTank.clone();
upperTank.position.y = 200;
group.add(upperTank);

// Compressor
const compressor = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,120,32),
new THREE.MeshStandardMaterial({color:0x222222})
);
compressor.position.set(0,320,0);
group.add(compressor);

// Control Panel
const panel = new THREE.Mesh(
new THREE.BoxGeometry(60,120,60),
new THREE.MeshStandardMaterial({color:0x2e8b57})
);
panel.position.set(-170,140,80);
group.add(panel);

// Pipe
const pipe = new THREE.Mesh(
new THREE.CylinderGeometry(20,20,120,32),
new THREE.MeshStandardMaterial({color:0xbbbbbb})
);
pipe.rotation.z = Math.PI/2;
pipe.position.set(200,200,0);
group.add(pipe);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ===== Layout =====

createCoolingTower(-300,-200);
createAHU(300,-200);
createPump(-300,0);
createPump(300,0);
createChiller(0,200);   // เพิ่มชิลเลอร์ตรงกลางด้านหลัง


// ===== Animate =====
function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
