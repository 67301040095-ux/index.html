<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mini Chiller Plant 3D</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(10,6,12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

/* FLOOR */
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(40,40),
  new THREE.MeshStandardMaterial({color:0xdddddd})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* CT */
const ct = new THREE.Mesh(
  new THREE.BoxGeometry(3,4,3),
  new THREE.MeshStandardMaterial({color:0xcccccc})
);
ct.position.set(-8,2,0);
scene.add(ct);

const fan = new THREE.Mesh(
  new THREE.CylinderGeometry(1.2,1.2,0.3,32),
  new THREE.MeshStandardMaterial({color:0x00aa00})
);
fan.position.set(-8,4.3,0);
scene.add(fan);

/* CDP */
const cdp = new THREE.Mesh(
  new THREE.CylinderGeometry(0.6,0.6,3,32),
  new THREE.MeshStandardMaterial({color:0xffcc00})
);
cdp.rotation.z = Math.PI/2;
cdp.position.set(-3,1,0);
scene.add(cdp);

/* CH */
const ch = new THREE.Mesh(
  new THREE.CylinderGeometry(1.2,1.2,5,32),
  new THREE.MeshStandardMaterial({color:0x999999})
);
ch.rotation.z = Math.PI/2;
ch.position.set(2,1.5,0);
scene.add(ch);

/* CHP */
const chp = new THREE.Mesh(
  new THREE.CylinderGeometry(0.6,0.6,3,32),
  new THREE.MeshStandardMaterial({color:0x0066ff})
);
chp.rotation.z = Math.PI/2;
chp.position.set(7,1,0);
scene.add(chp);

/* Animation */
function animate(){
  requestAnimationFrame(animate);
  fan.rotation.y += 0.2;
  controls.update();
  renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
