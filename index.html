<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vertical Pump</title>
<style>
body { margin: 0; overflow: hidden; background:#111; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ===== Scene =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
10000
);
camera.position.set(250,200,300);
camera.lookAt(0,120,0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== Light =====
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(200,300,200);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.4));

// ===== Grid =====
const grid = new THREE.GridHelper(1000,20);
scene.add(grid);


// ============================
// CREATE VERTICAL PUMP
// ============================

function createPump(){

const group = new THREE.Group();

// ===== ฐาน =====
const base = new THREE.Mesh(
new THREE.BoxGeometry(140,20,140),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
base.position.y = 10;
group.add(base);


// ===== หน้าแปลนล่าง =====
const flangeBottom = new THREE.Mesh(
new THREE.CylinderGeometry(55,55,15,32),
new THREE.MeshStandardMaterial({color:0x444444})
);
flangeBottom.position.y = 27;
group.add(flangeBottom);


// ===== ตัวเรือนปั๊ม =====
const pumpBody = new THREE.Mesh(
new THREE.CylinderGeometry(42,42,100,32),
new THREE.MeshStandardMaterial({color:0x0066ff})
);
pumpBody.position.y = 90;
group.add(pumpBody);


// ===== คอคัปปลิ้ง =====
const coupling = new THREE.Mesh(
new THREE.CylinderGeometry(28,28,25,32),
new THREE.MeshStandardMaterial({color:0x333333})
);
coupling.position.y = 152;
group.add(coupling);


// ===== มอเตอร์ =====
const motor = new THREE.Mesh(
new THREE.CylinderGeometry(38,38,80,32),
new THREE.MeshStandardMaterial({color:0x666666})
);
motor.position.y = 200;
group.add(motor);


// ===== ฝาท้ายมอเตอร์ =====
const motorCap = new THREE.Mesh(
new THREE.CylinderGeometry(30,30,20,32),
new THREE.MeshStandardMaterial({color:0x555555})
);
motorCap.position.y = 250;
group.add(motorCap);


// ===== ท่อซ้าย =====
const pipeLeft = new THREE.Mesh(
new THREE.CylinderGeometry(20,20,60,32),
new THREE.MeshStandardMaterial({color:0xbbbbbb})
);
pipeLeft.rotation.z = Math.PI/2;
pipeLeft.position.set(-70,90,0);
group.add(pipeLeft);


// ===== ท่อขวา =====
const pipeRight = new THREE.Mesh(
new THREE.CylinderGeometry(20,20,60,32),
new THREE.MeshStandardMaterial({color:0xbbbbbb})
);
pipeRight.rotation.z = Math.PI/2;
pipeRight.position.set(70,90,0);
group.add(pipeRight);


scene.add(group);
return group;
}

const pump = createPump();


// ===== Animation =====
function animate(){
requestAnimationFrame(animate);

// หมุนดูรอบ ๆ
pump.rotation.y += 0.005;

renderer.render(scene,camera);
}
animate();


// ===== Resize =====
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
