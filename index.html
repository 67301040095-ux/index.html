<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Chiller System</title>
<style>
body { margin:0; overflow:hidden; background:#1e2228; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== Scene =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2228);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,3000);
camera.position.set(0,400,700);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// ===== Light =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(300,500,200);
scene.add(light);

// ===== Ground =====
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(1200,800),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);


// ============================
// CREATE COOLING TOWER
// ============================

function createCoolingTower(x,z){

const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(200,20,200),
new THREE.MeshStandardMaterial({color:0x555555})
);
base.position.y = 10;
group.add(base);

const tower = new THREE.Mesh(
new THREE.BoxGeometry(150,200,150),
new THREE.MeshStandardMaterial({color:0xcfd2d6})
);
tower.position.y = 120;
group.add(tower);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ============================
// CREATE CHILLER (NEW)
// ============================

function createChiller(x,z){

const group = new THREE.Group();

// ฐาน
const base = new THREE.Mesh(
new THREE.BoxGeometry(360,20,160),
new THREE.MeshStandardMaterial({color:0x444444})
);
base.position.y = 10;
group.add(base);

// ตัวเครื่อง
const body = new THREE.Mesh(
new THREE.BoxGeometry(340,140,140),
new THREE.MeshStandardMaterial({color:0xcfd2d6})
);
body.position.y = 90;
group.add(body);

// คอมเพรสเซอร์ 2 ลูก
const compGeo = new THREE.CylinderGeometry(35,35,100,32);
const compMat = new THREE.MeshStandardMaterial({color:0x222222});

const comp1 = new THREE.Mesh(compGeo,compMat);
comp1.rotation.z = Math.PI/2;
comp1.position.set(-80,90,0);
group.add(comp1);

const comp2 = comp1.clone();
comp2.position.x = 80;
group.add(comp2);

// ท่อน้ำเข้า
const pipeIn = new THREE.Mesh(
new THREE.CylinderGeometry(15,15,80,32),
new THREE.MeshStandardMaterial({color:0x0077ff})
);
pipeIn.rotation.z = Math.PI/2;
pipeIn.position.set(-190,90,0);
group.add(pipeIn);

// ท่อน้ำออก
const pipeOut = pipeIn.clone();
pipeOut.position.x = 190;
group.add(pipeOut);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ============================
// CREATE AHU
// ============================

function createAHU(x,z){

const group = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(220,130,120),
new THREE.MeshStandardMaterial({color:0xdedede})
);
body.position.y = 85;
group.add(body);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ============================
// CREATE VERTICAL PUMP
// ============================

function createPump(x,z){

const group = new THREE.Group();

const body = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,90,32),
new THREE.MeshStandardMaterial({color:0x0077ff})
);
body.position.y = 70;
group.add(body);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ===== Layout =====

const CT = createCoolingTower(-300,-200);
const CH = createChiller(0,-100);   // 👈 เปลี่ยนตรงนี้แล้ว
const AHU = createAHU(300,-200);

const CDP = createPump(-300,0);
const CHP = createPump(300,0);


// ===== Animate =====
function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
