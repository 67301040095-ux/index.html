<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Chiller SCADA</title>

<style>

body{
margin:0;
overflow:hidden;
background:#0b0f1a;
font-family:Arial;
}

#panel{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
color:white;
}

button{
padding:8px 15px;
margin-right:5px;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div id="panel">

<button onclick="startSystem()">START</button>
<button onclick="stopSystem()">STOP</button>

<br><br>

Temperature
<input type="range" min="38" max="50" value="44" id="temp">
<span id="tempValue">44°F</span>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(8,6,10)

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let controls = new THREE.OrbitControls(camera,renderer.domElement)

let light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,5)
scene.add(light)

scene.add(new THREE.AmbientLight(0xffffff,0.4))

let floor = new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.MeshPhongMaterial({color:0xdddddd})
)

floor.rotation.x=-Math.PI/2
scene.add(floor)

function box(w,h,d,color){

let mesh=new THREE.Mesh(
new THREE.BoxGeometry(w,h,d),
new THREE.MeshPhongMaterial({color:color})
)

scene.add(mesh)
return mesh

}

function cylinder(r,h,color){

let mesh=new THREE.Mesh(
new THREE.CylinderGeometry(r,r,h,32),
new THREE.MeshPhongMaterial({color:color})
)

scene.add(mesh)
return mesh

}

/* อุปกรณ์ */

let CT = box(2,2,2,0xffffff)
CT.position.set(0,1,0)

let CDP = cylinder(0.4,1,0x0066ff)
CDP.position.set(0,-1.5,0)

let CH = box(2,2,3,0x00aa88)
CH.position.set(0,-4,0)

let CHP = cylinder(0.4,1,0x0066ff)
CHP.position.set(0,-6.5,0)

let AHU = box(2,2,2,0x888888)
AHU.position.set(0,-9,0)

/* ท่อ */

let pipeMat = new THREE.MeshBasicMaterial({color:0xff5500})

let pipe1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,3),pipeMat)
pipe1.position.set(0,-0.5,0)
scene.add(pipe1)

let pipe2 = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,3),pipeMat)
pipe2.position.set(0,-3,0)
scene.add(pipe2)

let pipe3 = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,3),pipeMat)
pipe3.position.set(0,-5.5,0)
scene.add(pipe3)

let pipe4 = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,3),pipeMat)
pipe4.position.set(0,-8,0)
scene.add(pipe4)

/* น้ำไหล */

let water = new THREE.TextureLoader().load(
'https://threejs.org/examples/textures/water.jpg'
)

water.wrapS=water.wrapT=THREE.RepeatWrapping

let pipeFlow = new THREE.MeshBasicMaterial({
map:water
})

let flow = new THREE.Mesh(
new THREE.CylinderGeometry(0.05,0.05,10),
pipeFlow
)

flow.position.set(0,-5,0)
scene.add(flow)

/* fan */

let fan = new THREE.Mesh(
new THREE.BoxGeometry(0.2,0.02,1),
new THREE.MeshBasicMaterial({color:0x000000})
)

fan.position.copy(CT.position)
fan.position.y +=1.2
scene.add(fan)

/* AHU fan */

let ahuFan = new THREE.Mesh(
new THREE.BoxGeometry(0.2,0.02,1),
new THREE.MeshBasicMaterial({color:0x000000})
)

ahuFan.position.copy(AHU.position)
ahuFan.position.y +=1.2
scene.add(ahuFan)

let running=false

function startSystem(){

running=true

}

function stopSystem(){

running=false

}

let temp=document.getElementById("temp")
let tempText=document.getElementById("tempValue")

temp.oninput=function(){

tempText.innerText=this.value+"°F"

}

function animate(){

requestAnimationFrame(animate)

if(running){

fan.rotation.y+=0.2
ahuFan.rotation.y+=0.2

flow.material.map.offset.y-=0.02

}

controls.update()
renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
