<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Chiller Scene</title>
<style>
  body { margin: 0; overflow: hidden; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e1e2f);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 15);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ================= LIGHT ================= */
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));

/* ================= FLOOR ================= */
const floorGeo = new THREE.PlaneGeometry(40, 40);
const floorMat = new THREE.MeshStandardMaterial({color:0xdddddd});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

/* ================= CHILLER GROUP ================= */
const chillerGroup = new THREE.Group();
scene.add(chillerGroup);

/* ===== Lower Tank (Evaporator) ===== */
const lowerGeo = new THREE.CylinderGeometry(1.2,1.2,4,32);
const lowerMat = new THREE.MeshStandardMaterial({color:0x1f5f3a});
const lowerTank = new THREE.Mesh(lowerGeo, lowerMat);
lowerTank.rotation.z = Math.PI/2;
lowerTank.position.y = 1.2;
chillerGroup.add(lowerTank);

/* ===== Upper Tank (Condenser) ===== */
const upperGeo = new THREE.CylinderGeometry(1.2,1.2,4,32);
const upperTank = new THREE.Mesh(upperGeo, lowerMat);
upperTank.rotation.z = Math.PI/2;
upperTank.position.y = 3;
chillerGroup.add(upperTank);

/* ===== Compressor (Top Black Vertical) ===== */
const compGeo = new THREE.CylinderGeometry(0.4,0.4,2,32);
const compMat = new THREE.MeshStandardMaterial({color:0x222222});
const compressor = new THREE.Mesh(compGeo, compMat);
compressor.position.set(0,5,0);
chillerGroup.add(compressor);

/* ===== Control Panel ===== */
const panelGeo = new THREE.BoxGeometry(0.8,2,1);
const panelMat = new THREE.MeshStandardMaterial({color:0x2e8b57});
const controlPanel = new THREE.Mesh(panelGeo, panelMat);
controlPanel.position.set(-3,2,0);
chillerGroup.add(controlPanel);

/* ===== Right Pipe ===== */
const pipeGeo = new THREE.CylinderGeometry(0.3,0.3,2,16);
const pipeMat = new THREE.MeshStandardMaterial({color:0xcccccc});
const pipe = new THREE.Mesh(pipeGeo, pipeMat);
pipe.rotation.z = Math.PI/2;
pipe.position.set(3,3,0);
chillerGroup.add(pipe);

/* ================= SMALL SIDE TANKS ================= */
function createSideTank(xPos){
  const baseGeo = new THREE.BoxGeometry(2,0.3,2);
  const baseMat = new THREE.MeshStandardMaterial({color:0x111111});
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.set(xPos,0.15,0);
  scene.add(base);

  const tankGeo = new THREE.CylinderGeometry(0.8,0.8,2,32);
  const tankMat = new THREE.MeshStandardMaterial({color:0x2a82d6});
  const tank = new THREE.Mesh(tankGeo, tankMat);
  tank.position.set(xPos,1.3,0);
  scene.add(tank);
}

createSideTank(-6);
createSideTank(6);

/* ================= SCALE DOWN FIX ================= */
/* ย่อทั้งเครื่องให้เล็กลงแบบไม่โล้ */
chillerGroup.scale.set(0.7,0.7,0.7);

/* ดันเครื่องให้ฐานแตะพื้น */
chillerGroup.position.y = 0;

/* ================= RENDER LOOP ================= */
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
