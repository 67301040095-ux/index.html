<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HVAC Equipment Real Shape</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== BASIC SETUP =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe6f2ff);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.set(1000,600,1000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,0.8);
light.position.set(500,800,500);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(4000,4000),
new THREE.MeshStandardMaterial({color:0xdddddd})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== FUNCTION =====
function createBox(x,z,w,h,d,color){
const mesh = new THREE.Mesh(
new THREE.BoxGeometry(w,h,d),
new THREE.MeshStandardMaterial({color})
);
mesh.position.set(x,h/2,z);
scene.add(mesh);
return mesh;
}

function createVerticalPump(x,z,color){
const group = new THREE.Group();

// ฐาน
const base = new THREE.Mesh(
new THREE.CylinderGeometry(80,80,40,32),
new THREE.MeshStandardMaterial({color:0x333333})
);
base.position.y = 20;
group.add(base);

// ตัวปั้มแนวตั้ง
const body = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,220,32),
new THREE.MeshStandardMaterial({color})
);
body.position.y = 150;
group.add(body);

group.position.set(x,0,z);
scene.add(group);
}

// ===== EQUIPMENT =====

// CT (Cooling Tower ทรงสี่เหลี่ยม + พัดลมบน)
const ct = createBox(-1200,0,350,450,350,0x666666);

// พัดลม CT
const fanGroup = new THREE.Group();

const fanBase = new THREE.Mesh(
new THREE.CylinderGeometry(100,100,20,32),
new THREE.MeshStandardMaterial({color:0x222222})
);
fanBase.position.y = 460;
fanGroup.add(fanBase);

// ใบพัด
for(let i=0;i<4;i++){
const blade = new THREE.Mesh(
new THREE.BoxGeometry(200,12,30),
new THREE.MeshStandardMaterial({color:0xffffff})
);
blade.position.y = 470;
blade.rotation.y = i*(Math.PI/2);
fanGroup.add(blade);
}

fanGroup.position.set(-1200,0,0);
scene.add(fanGroup);

// CDP (ปั้มแนวตั้ง สีแดง)
createVerticalPump(-600,0,0xaa0000);

// CH (Chiller)
createBox(0,0,450,250,300,0x999999);

// CHP (ปั้มแนวตั้ง สีน้ำเงิน)
createVerticalPump(600,0,0x0033aa);

// AHU
createBox(1200,0,400,250,300,0x777777);

// ===== ANIMATE =====
function animate(){
requestAnimationFrame(animate);
controls.update();
fanGroup.rotation.y += 0.05;
renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
