<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cooling Tower</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xa0c4ff);

// ================= CAMERA =================
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
);
camera.position.set(400,400,600);
camera.lookAt(0,150,0);

// ================= RENDERER =================
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= LIGHT =================
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(300,500,300);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.4);
scene.add(ambient);

// ================= GROUND =================
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(2000,2000),
new THREE.MeshStandardMaterial({color:0xdddddd})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= COOLING TOWER =================
function createCoolingTower(x,z){

const group = new THREE.Group();

// BASE
const base = new THREE.Mesh(
new THREE.BoxGeometry(220,40,220),
new THREE.MeshStandardMaterial({color:0x444444})
);
base.position.y = 20;
group.add(base);

// BODY
const body = new THREE.Mesh(
new THREE.BoxGeometry(170,220,170),
new THREE.MeshStandardMaterial({color:0x666666})
);
body.position.y = 150;
group.add(body);

// ROOF VENT
for(let i=0;i<4;i++){
const vent = new THREE.Mesh(
new THREE.BoxGeometry(150,25,12),
new THREE.MeshStandardMaterial({color:0x999999})
);
vent.position.y = 250;

if(i===0){ vent.position.z = 85; }
if(i===1){ vent.position.z = -85; }
if(i===2){ vent.rotation.y = Math.PI/2; vent.position.x = 85; }
if(i===3){ vent.rotation.y = Math.PI/2; vent.position.x = -85; }

group.add(vent);
}

// ROOF FRAME
const roofFrame = new THREE.Mesh(
new THREE.BoxGeometry(190,25,190),
new THREE.MeshStandardMaterial({color:0x333333})
);
roofFrame.position.y = 275;
group.add(roofFrame);

// FAN GROUP
const fanGroup = new THREE.Group();

// fan base
const fanBase = new THREE.Mesh(
new THREE.CylinderGeometry(65,65,15,32),
new THREE.MeshStandardMaterial({color:0x222222})
);
fanBase.position.y = 285;
fanGroup.add(fanBase);

// blades
for(let i=0;i<4;i++){
const blade = new THREE.Mesh(
new THREE.BoxGeometry(120,8,18),
new THREE.MeshStandardMaterial({color:0xcccccc})
);
blade.position.y = 292;
blade.rotation.y = (Math.PI/2)*i;
fanGroup.add(blade);
}

group.add(fanGroup);

group.position.set(x,0,z);
scene.add(group);

return fanGroup; // เอาไว้หมุน
}

// ================= CREATE CT =================
const fan = createCoolingTower(0,0);

// ================= ANIMATE =================
function animate(){
requestAnimationFrame(animate);

// หมุนพัดลม
fan.rotation.y += 0.1;

renderer.render(scene,camera);
}
animate();

// ================= RESIZE =================
window.addEventListener('resize',()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
