<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chiller SCADA</title>

<style>

body{
margin:0;
background:#0b0f1a;
overflow:hidden;
font-family:Arial;
}

#panel{
position:absolute;
top:20px;
left:20px;
background:#111;
padding:15px;
border-radius:10px;
color:white;
}

button{
padding:8px 15px;
margin-right:5px;
}

</style>
</head>

<body>

<div id="panel">

<button onclick="startSystem()">START</button>
<button onclick="stopSystem()">STOP</button>

<br><br>

Temperature
<input type="range" min="38" max="50" value="44" id="temp">
<span id="tempValue">44°F</span>

</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f1a);

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(8,6,10);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.5));

const floor = new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.MeshStandardMaterial({color:0xdddddd})
);

floor.rotation.x=-Math.PI/2;
scene.add(floor);

function box(w,h,d,color){

const mesh=new THREE.Mesh(
new THREE.BoxGeometry(w,h,d),
new THREE.MeshStandardMaterial({color:color})
);

scene.add(mesh);
return mesh;

}

function pump(){

const mesh=new THREE.Mesh(
new THREE.CylinderGeometry(0.4,0.4,1,32),
new THREE.MeshStandardMaterial({color:0x0066ff})
);

scene.add(mesh);
return mesh;

}

/* equipment */

const CT=box(2,2,2,0xffffff);
CT.position.set(0,1,0);

const CDP=pump();
CDP.position.set(0,-1.5,0);

const CH=box(2,2,3,0x00aa88);
CH.position.set(0,-4,0);

const CHP=pump();
CHP.position.set(0,-6.5,0);

const AHU=box(2,2,2,0x888888);
AHU.position.set(0,-9,0);

/* pipes */

function pipe(y){

const p=new THREE.Mesh(
new THREE.CylinderGeometry(0.1,0.1,3,16),
new THREE.MeshStandardMaterial({color:0xff5500})
);

p.position.set(0,y,0);
scene.add(p);

}

pipe(-0.5);
pipe(-3);
pipe(-5.5);
pipe(-8);

/* fan */

const fan=new THREE.Mesh(
new THREE.BoxGeometry(0.2,0.02,1),
new THREE.MeshStandardMaterial({color:0x000000})
);

fan.position.copy(CT.position);
fan.position.y+=1.2;
scene.add(fan);

const ahuFan=new THREE.Mesh(
new THREE.BoxGeometry(0.2,0.02,1),
new THREE.MeshStandardMaterial({color:0x000000})
);

ahuFan.position.copy(AHU.position);
ahuFan.position.y+=1.2;
scene.add(ahuFan);

/* control */

let running=false;

window.startSystem=function(){
running=true;
}

window.stopSystem=function(){
running=false;
}

/* temp */

const temp=document.getElementById("temp");
const tempValue=document.getElementById("tempValue");

temp.oninput=function(){
tempValue.innerText=this.value+"°F";
}

/* animation */

function animate(){

requestAnimationFrame(animate);

if(running){

fan.rotation.y+=0.2;
ahuFan.rotation.y+=0.2;

}

controls.update();
renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
