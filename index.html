<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CHILLER SYSTEM 3D</title>

<style>
body{
margin:0;
overflow:hidden;
}

#ui{
position:absolute;
top:20px;
left:20px;
}

button{
padding:10px 20px;
font-size:16px;
margin-right:10px;
}
</style>
</head>

<body>

<div id="ui">
<button onclick="startSystem()">START</button>
<button onclick="stopSystem()">STOP</button>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

//================
// SYSTEM STATE
//================
let systemRun = false
let water = []


//================
// SCENE
//================
const scene = new THREE.Scene()
scene.background = new THREE.Color(0xffffff)


//================
// CAMERA
//================
const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(10,6,14)


//================
// RENDERER
//================
const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)


//================
// CONTROL
//================
const controls = new THREE.OrbitControls(camera,renderer.domElement)


//================
// LIGHT
//================
const light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(10,20,10)
scene.add(light)

const ambient = new THREE.AmbientLight(0xffffff,0.7)
scene.add(ambient)


//================
// GROUND
//================
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(40,40),
new THREE.MeshStandardMaterial({color:0xeeeeee})
)

ground.rotation.x = -Math.PI/2
scene.add(ground)



//================
// COOLING TOWER
//================

const CTbase = new THREE.Mesh(
new THREE.BoxGeometry(3,1,3),
new THREE.MeshStandardMaterial({color:0xbfbfbf})
)

CTbase.position.set(0,0.5,10)
scene.add(CTbase)


const CTbody = new THREE.Mesh(
new THREE.BoxGeometry(2.2,4,2.2),
new THREE.MeshStandardMaterial({color:0xe6e6e6})
)

CTbody.position.set(0,3,10)
scene.add(CTbody)


const CTtop = new THREE.Mesh(
new THREE.BoxGeometry(2.5,0.4,2.5),
new THREE.MeshStandardMaterial({color:0xd0d0d0})
)

CTtop.position.set(0,5.2,10)
scene.add(CTtop)


const fanBlade = new THREE.Mesh(
new THREE.BoxGeometry(2.2,0.1,0.3),
new THREE.MeshStandardMaterial({color:0x222222})
)

fanBlade.position.set(0,5.6,10)
scene.add(fanBlade)



//================
// PUMPS
//================

const pumpMaterial = new THREE.MeshStandardMaterial({color:0x222222})

const pump1 = new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.7,2,32),
pumpMaterial
)

pump1.position.set(1,1,6)
scene.add(pump1)


const pump2 = new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.7,2,32),
pumpMaterial
)

pump2.position.set(1,1,-6)
scene.add(pump2)



//================
// CHILLER
//================

const CH = new THREE.Mesh(
new THREE.BoxGeometry(4,2,2),
new THREE.MeshStandardMaterial({color:0xdddddd})
)

CH.position.set(0,1,0)
scene.add(CH)



//================
// AHU
//================

const AHU = new THREE.Mesh(
new THREE.BoxGeometry(3,1.5,2),
new THREE.MeshStandardMaterial({color:0xff4444})
)

AHU.position.set(0,1,-10)
scene.add(AHU)



//================
// PIPE
//================

function pipe(x,z1,z2,color){

const length = Math.abs(z2-z1)

const pipe = new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,length,16),
new THREE.MeshStandardMaterial({color:color})
)

pipe.rotation.x = Math.PI/2
pipe.position.set(x,1,(z1+z2)/2)

scene.add(pipe)

}

pipe(-1,10,6,0xff0000)
pipe(-1,6,0,0xff0000)
pipe(-1,0,-6,0xff0000)
pipe(-1,-6,-10,0xff0000)

pipe(1,-10,-6,0x00ffff)
pipe(1,-6,0,0x00ffff)
pipe(1,0,6,0x00ffff)
pipe(1,6,10,0x00ffff)



//================
// WATER
//================

function createWater(x,z){

const drop = new THREE.Mesh(
new THREE.SphereGeometry(0.15,16,16),
new THREE.MeshStandardMaterial({color:0x00ffff})
)

drop.position.set(x,1,z)

scene.add(drop)

water.push(drop)

}

createWater(-1,9)
createWater(-1,5)
createWater(-1,1)
createWater(-1,-3)
createWater(-1,-7)

createWater(1,-9)
createWater(1,-5)
createWater(1,-1)
createWater(1,3)
createWater(1,7)



//================
// BUTTON CONTROL
//================

function startSystem(){

systemRun = true
pumpMaterial.color.set(0x00ff00)

}

function stopSystem(){

systemRun = false
pumpMaterial.color.set(0x222222)

}



//================
// ANIMATION
//================

function animate(){

requestAnimationFrame(animate)

controls.update()

if(systemRun){

fanBlade.rotation.y += 0.4

for(let i=0;i<water.length;i++){

if(i < 5){

water[i].position.z -= 0.05
if(water[i].position.z < -10){
water[i].position.z = 10
}

}else{

water[i].position.z += 0.05
if(water[i].position.z > 10){
water[i].position.z = -10
}

}

}

}

renderer.render(scene,camera)

}

animate()



//================
// RESIZE
//================

window.addEventListener('resize',()=>{

camera.aspect = window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
