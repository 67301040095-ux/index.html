<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Chiller System</title>
<style>
body { margin:0; overflow:hidden; background:#1e2228; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== Scene =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2228);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,3000);
camera.position.set(0,400,700);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// ===== Light =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(300,500,200);
scene.add(light);

// ===== Ground =====
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(1200,800),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);


// ============================
// CREATE BOX (CT / CH / AHU)
// ============================

function createBox(x,z,color,height=120,width=120,depth=120){
const box = new THREE.Mesh(
new THREE.BoxGeometry(width,height,depth),
new THREE.MeshStandardMaterial({color:color})
);
box.position.set(x,height/2,z);
scene.add(box);
return box;
}


// ============================
// CREATE VERTICAL PUMP
// ============================

function createPump(x,z){

const group = new THREE.Group();

// ฐาน
const base = new THREE.Mesh(
new THREE.BoxGeometry(120,15,120),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
base.position.y = 7.5;
group.add(base);

// หน้าแปลนล่าง
const flangeBottom = new THREE.Mesh(
new THREE.CylinderGeometry(50,50,12,32),
new THREE.MeshStandardMaterial({color:0x444444})
);
flangeBottom.position.y = 21;
group.add(flangeBottom);

// ตัวปั๊ม
const body = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,90,32),
new THREE.MeshStandardMaterial({color:0x0077ff})
);
body.position.y = 70;
group.add(body);

// คัปปลิ้ง
const coupling = new THREE.Mesh(
new THREE.CylinderGeometry(25,25,20,32),
new THREE.MeshStandardMaterial({color:0x333333})
);
coupling.position.y = 120;
group.add(coupling);

// มอเตอร์ (ไม่ยาวเกิน)
const motor = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,60,32),
new THREE.MeshStandardMaterial({color:0x666666})
);
motor.position.y = 160;
group.add(motor);

// ท่อซ้าย
const pipeLeft = new THREE.Mesh(
new THREE.CylinderGeometry(18,18,45,32),
new THREE.MeshStandardMaterial({color:0xbbbbbb})
);
pipeLeft.rotation.z = Math.PI/2;
pipeLeft.position.set(-55,70,0);
group.add(pipeLeft);

// ท่อขวา
const pipeRight = new THREE.Mesh(
new THREE.CylinderGeometry(18,18,45,32),
new THREE.MeshStandardMaterial({color:0xbbbbbb})
);
pipeRight.rotation.z = Math.PI/2;
pipeRight.position.set(55,70,0);
group.add(pipeRight);

group.position.set(x,0,z);
scene.add(group);

return group;
}


// ===== Layout =====

const CT = createBox(-300,-200,0x444444,140,140,140);
const CH = createBox(0,-100,0x888888,160,160,160);
const AHU = createBox(300,-200,0xddddcc,120,200,120);

const CDP = createPump(-300,0);
const CHP = createPump(300,0);


// ===== Animate =====
function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
