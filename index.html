
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHILLER SYSTEM 3D</title>

<style>
body{
margin:0;
overflow:hidden;
}

#ui{
position:absolute;
top:20px;
left:20px;
z-index:10;
}

button{
padding:10px 20px;
font-size:16px;
margin-right:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">
<button onclick="startSystem()">START</button>
<button onclick="stopSystem()">STOP</button>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

let systemRun = false

// SCENE
const scene = new THREE.Scene()
scene.background = new THREE.Color(0xeeeeee)

// CAMERA
const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(8,6,12)

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)
document.body.appendChild(renderer.domElement)

// CONTROL
const controls = new THREE.OrbitControls(camera,renderer.domElement)

// LIGHT
const ambient = new THREE.AmbientLight(0xffffff,0.8)
scene.add(ambient)

const light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(10,20,10)
scene.add(light)

// GROUND
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(30,30),
new THREE.MeshStandardMaterial({color:0xcccccc})
)

ground.rotation.x = -Math.PI/2
scene.add(ground)


// COOLING TOWER
const CT = new THREE.Mesh(
new THREE.BoxGeometry(3,5,3),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
)

CT.position.set(0,2.5,10)
scene.add(CT)


// FAN
const fan = new THREE.Mesh(
new THREE.CylinderGeometry(1,1,0.3,32),
new THREE.MeshStandardMaterial({color:0x333333})
)

fan.position.set(0,5.5,10)
scene.add(fan)


// PUMP MATERIAL
const pumpMaterial = new THREE.MeshStandardMaterial({color:0x000000})


// CDP PUMP
const pump1 = new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.7,2,32),
pumpMaterial
)

pump1.position.set(1,1,6)
scene.add(pump1)


// CHILLER
const CH = new THREE.Mesh(
new THREE.BoxGeometry(4,2,2),
new THREE.MeshStandardMaterial({color:0xdddddd})
)

CH.position.set(0,1,0)
scene.add(CH)


// CHP PUMP
const pump2 = new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.7,2,32),
pumpMaterial
)

pump2.position.set(1,1,-6)
scene.add(pump2)


// AHU
const AHU = new THREE.Mesh(
new THREE.BoxGeometry(3,1.5,2),
new THREE.MeshStandardMaterial({color:0xff3333})
)

AHU.position.set(0,1,-10)
scene.add(AHU)


// PIPE FUNCTION
function pipe(x,z1,z2,color){

const length = Math.abs(z2-z1)

const pipe = new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,length,16),
new THREE.MeshStandardMaterial({color:color})
)

pipe.rotation.x = Math.PI/2
pipe.position.set(x,1,(z1+z2)/2)

scene.add(pipe)

}

// SUPPLY
pipe(-1,10,6,0xff0000)
pipe(-1,6,0,0xff0000)
pipe(-1,0,-6,0xff0000)
pipe(-1,-6,-10,0xff0000)

// RETURN
pipe(1,-10,-6,0x00ffff)
pipe(1,-6,0,0x00ffff)
pipe(1,0,6,0x00ffff)
pipe(1,6,10,0x00ffff)


// -------------------
// WATER FLOW
// -------------------

let water = []

function createWater(x,z){

const drop = new THREE.Mesh(
new THREE.SphereGeometry(0.15,16,16),
new THREE.MeshStandardMaterial({color:0x00ffff})
)

drop.position.set(x,1,z)

scene.add(drop)

water.push(drop)

}

// CREATE WATER
createWater(-1,9)
createWater(-1,5)
createWater(-1,1)
createWater(-1,-3)
createWater(-1,-7)

createWater(1,-9)
createWater(1,-5)
createWater(1,-1)
createWater(1,3)
createWater(1,7)


// CONTROL
function startSystem(){
systemRun = true
}

function stopSystem(){
systemRun = false
pumpMaterial.color.set(0x000000)
}


// ANIMATION
function animate(){

requestAnimationFrame(animate)

controls.update()

if(systemRun){

fan.rotation.y += 0.3

pumpMaterial.color.set(0x00ff00)

// WATER FLOW
for(let i=0;i<water.length;i++){

if(i < 5){

water[i].position.z -= 0.05
if(water[i].position.z < -10) water[i].position.z = 10

}else{

water[i].position.z += 0.05
if(water[i].position.z > 10) water[i].position.z = -10

}

}

}

renderer.render(scene,camera)

}

animate()


// RESIZE FIX
window.addEventListener('resize',()=>{

camera.aspect = window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})
