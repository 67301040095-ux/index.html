<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HVAC Realistic Equipment</title>
<style>
body{margin:0;overflow:hidden;}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== BASIC =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xe6f2ff);

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,5000);
camera.position.set(1200,700,1200);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light=new THREE.DirectionalLight(0xffffff,0.8);
light.position.set(600,900,600);
scene.add(light);

// Ground
const ground=new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({color:0xdddddd})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== COOLING TOWER (Hyperbolic) =====
const ctGroup=new THREE.Group();

const towerGeometry=new THREE.CylinderGeometry(200,250,500,64,1,true);
const towerMaterial=new THREE.MeshStandardMaterial({
color:0x777777,
side:THREE.DoubleSide
});
const tower=new THREE.Mesh(towerGeometry,towerMaterial);
tower.position.y=250;
ctGroup.add(tower);

// ช่องลม
for(let i=0;i<6;i++){
const vent=new THREE.Mesh(
new THREE.BoxGeometry(20,150,120),
new THREE.MeshStandardMaterial({color:0x555555})
);
vent.position.set(
Math.cos(i*Math.PI/3)*220,
150,
Math.sin(i*Math.PI/3)*220
);
vent.lookAt(0,150,0);
ctGroup.add(vent);
}

// พัดลมบน
const fanBase=new THREE.Mesh(
new THREE.CylinderGeometry(120,120,20,32),
new THREE.MeshStandardMaterial({color:0x222222})
);
fanBase.position.y=520;
ctGroup.add(fanBase);

const blades=new THREE.Group();
for(let i=0;i<4;i++){
const blade=new THREE.Mesh(
new THREE.BoxGeometry(220,12,30),
new THREE.MeshStandardMaterial({color:0xffffff})
);
blade.rotation.y=i*(Math.PI/2);
blades.add(blade);
}
blades.position.y=530;
ctGroup.add(blades);

ctGroup.position.set(-1500,0,0);
scene.add(ctGroup);

// ===== VERTICAL PUMP WITH FLANGE =====
function createPump(x,z,color){
const group=new THREE.Group();

// ฐาน
const base=new THREE.Mesh(
new THREE.CylinderGeometry(100,100,40,32),
new THREE.MeshStandardMaterial({color:0x333333})
);
base.position.y=20;
group.add(base);

// ตัวปั้ม
const body=new THREE.Mesh(
new THREE.CylinderGeometry(50,50,300,32),
new THREE.MeshStandardMaterial({color})
);
body.position.y=190;
group.add(body);

// หน้าแปลนเข้า
const flange1=new THREE.Mesh(
new THREE.CylinderGeometry(70,70,20,32),
new THREE.MeshStandardMaterial({color:0x444444})
);
flange1.rotation.z=Math.PI/2;
flange1.position.set(-80,150,0);
group.add(flange1);

// หน้าแปลนออก
const flange2=flange1.clone();
flange2.position.set(80,150,0);
group.add(flange2);

group.position.set(x,0,z);
scene.add(group);
}

// CDP
createPump(-700,0,0xaa0000);

// CHILLER
const chiller=new THREE.Mesh(
new THREE.BoxGeometry(600,300,350),
new THREE.MeshStandardMaterial({color:0x999999})
);
chiller.position.set(0,150,0);
scene.add(chiller);

// CHP
createPump(700,0,0x0033aa);

// AHU (มีช่องลม)
const ahuGroup=new THREE.Group();
const ahuBody=new THREE.Mesh(
new THREE.BoxGeometry(500,300,300),
new THREE.MeshStandardMaterial({color:0x777777})
);
ahuBody.position.y=150;
ahuGroup.add(ahuBody);

for(let i=-1;i<=1;i++){
const grill=new THREE.Mesh(
new THREE.BoxGeometry(20,200,200),
new THREE.MeshStandardMaterial({color:0x555555})
);
grill.position.set(250,150,i*70);
ahuGroup.add(grill);
}

ahuGroup.position.set(1500,0,0);
scene.add(ahuGroup);

// ===== ANIMATION =====
function animate(){
requestAnimationFrame(animate);
controls.update();
blades.rotation.y+=0.05;
renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
