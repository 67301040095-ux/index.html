<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHILLER SYSTEM 3D</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
}
</style>

</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(10,8,12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera,renderer.domElement);


// LIGHT
const ambient = new THREE.AmbientLight(0xffffff,0.8);
scene.add(ambient);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);


// GROUND
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(30,30),
new THREE.MeshStandardMaterial({color:0xcccccc})
);

ground.rotation.x = -Math.PI/2;
scene.add(ground);


// ----------------------
// CT (Cooling Tower)
// ----------------------

const CT = new THREE.Group();


// ฐาน
const base = new THREE.Mesh(
  new THREE.BoxGeometry(2.2,0.4,2.2),
  new THREE.MeshStandardMaterial({color:0x666666})
);
base.position.y = 0.2;
CT.add(base);


// ตัวหอล่าง
const towerLower = new THREE.Mesh(
  new THREE.BoxGeometry(1.6,3.5,1.6),
  new THREE.MeshStandardMaterial({color:0x00aaff})
);
towerLower.position.y = 2;
CT.add(towerLower);


// ตัวหอบานด้านบน
const towerUpper = new THREE.Mesh(
  new THREE.BoxGeometry(2.1,1.5,2.1),
  new THREE.MeshStandardMaterial({color:0x0099dd})
);
towerUpper.position.y = 4.5;
CT.add(towerUpper);


// Louver รอบ
for(let i=-2;i<=2;i++){

let l1 = new THREE.Mesh(
new THREE.BoxGeometry(1.7,0.08,0.1),
new THREE.MeshStandardMaterial({color:0xffffff})
);

l1.position.set(0,2+i*0.25,0.9);
CT.add(l1);

let l2 = l1.clone();
l2.position.z = -0.9;
CT.add(l2);

let l3 = new THREE.Mesh(
new THREE.BoxGeometry(0.1,0.08,1.7),
new THREE.MeshStandardMaterial({color:0xffffff})
);

l3.position.set(0.9,2+i*0.25,0);
CT.add(l3);

let l4 = l3.clone();
l4.position.x = -0.9;
CT.add(l4);

}


// ฝาครอบพัดลม
const fanCover = new THREE.Mesh(
  new THREE.CylinderGeometry(0.8,0.8,0.25,32),
  new THREE.MeshStandardMaterial({color:0x333333})
);
fanCover.position.y = 5.5;
CT.add(fanCover);


// ===== พัดลม =====
const fan = new THREE.Group();
fan.position.y = 5.7;

const hub = new THREE.Mesh(
  new THREE.CylinderGeometry(0.15,0.15,0.2,16),
  new THREE.MeshStandardMaterial({color:0xff0000}) // สีพัดลม
);
hub.rotation.z = Math.PI/2;
fan.add(hub);


// ใบพัด
for(let i=0;i<4;i++){

const blade = new THREE.Mesh(
new THREE.BoxGeometry(1.2,0.15,0.08),
new THREE.MeshStandardMaterial({color:0x222222})
);

blade.rotation.y = i*(Math.PI/2);

fan.add(blade);

}

CT.add(fan);
}

CT.add(fan);


// ตำแหน่ง
CT.position.set(0,0,10);
scene.add(CT);
  
// ----------------------
// CDP (Pump)
// ----------------------

const CDP = new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.7,2,32),
new THREE.MeshStandardMaterial({color:0x111111})
);

CDP.position.set(1,1,6);
scene.add(CDP);


// ----------------------
// CH (Chiller)
// ----------------------

const CH = new THREE.Mesh(
new THREE.BoxGeometry(4,2,2),
new THREE.MeshStandardMaterial({color:0xffcc00})
);

CH.position.set(0,1,0);
scene.add(CH);


// ----------------------
// CHP (Pump)
// ----------------------

const CHP = new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.7,2,32),
new THREE.MeshStandardMaterial({color:0x111111})
);

CHP.position.set(1,1,-6);
scene.add(CHP);


// ----------------------
// AHU
// ----------------------

const AHU = new THREE.Mesh(
new THREE.BoxGeometry(3,1.5,2),
new THREE.MeshStandardMaterial({color:0xff3333})
);

AHU.position.set(0,1,-10);
scene.add(AHU);


// =======================
// PIPE SYSTEM
// =======================

function pipe(x,z1,z2,color){

const length = Math.abs(z2-z1);

const pipe = new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,length,16),
new THREE.MeshStandardMaterial({color:color})
);

pipe.rotation.x = Math.PI/2;

pipe.position.set(x,1,(z1+z2)/2);

scene.add(pipe);

}


// 🔴 SUPPLY
pipe(-1,10,6,0xff0000);
pipe(-1,6,0,0xff0000);
pipe(-1,0,-6,0xff0000);
pipe(-1,-6,-10,0xff0000);


// 🔵 RETURN
pipe(1,-10,-6,0x00ffff);
pipe(1,-6,0,0x00ffff);
pipe(1,0,6,0x00ffff);
pipe(1,6,10,0x00ffff);


// ANIMATE
function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
