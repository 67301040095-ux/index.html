<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Plant System Full</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbfdfff);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(
75, window.innerWidth/window.innerHeight, 0.1, 5000
);
camera.position.set(800,500,800);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== CONTROLS =====
const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// ===== LIGHT =====
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(500,800,500);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff,0.4));

// ===== GROUND =====
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(4000,4000),
new THREE.MeshStandardMaterial({color:0xdddddd})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ==========================================
// =============== FUNCTIONS ===============
// ==========================================

function pipeHorizontal(x,y,z,length){
const pipe = new THREE.Mesh(
new THREE.CylinderGeometry(15,15,length,16),
new THREE.MeshStandardMaterial({color:0x888888})
);
pipe.rotation.z = Math.PI/2;
pipe.position.set(x,y,z);
scene.add(pipe);
}

function pipeVertical(x,y,z,length){
const pipe = new THREE.Mesh(
new THREE.CylinderGeometry(15,15,length,16),
new THREE.MeshStandardMaterial({color:0x888888})
);
pipe.position.set(x,y,z);
scene.add(pipe);
}

function valve(x,y,z){
const body = new THREE.Mesh(
new THREE.SphereGeometry(25,16,16),
new THREE.MeshStandardMaterial({color:0xcc0000})
);
body.position.set(x,y,z);
scene.add(body);
}

function structure(x,z){
const frame = new THREE.Mesh(
new THREE.BoxGeometry(500,20,80),
new THREE.MeshStandardMaterial({color:0x444444})
);
frame.position.set(x,60,z);
scene.add(frame);
}

// ==========================================
// =============== EQUIPMENT ===============
// ==========================================

// ---- Tank ----
const tank = new THREE.Mesh(
new THREE.CylinderGeometry(120,120,250,32),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
);
tank.position.set(-600,125,0);
scene.add(tank);

// ---- Pump (Vertical) ----
const pumpGroup = new THREE.Group();

const base = new THREE.Mesh(
new THREE.CylinderGeometry(60,60,40,32),
new THREE.MeshStandardMaterial({color:0x333333})
);
base.position.y = 20;
pumpGroup.add(base);

const body = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,140,32),
new THREE.MeshStandardMaterial({color:0x0066cc})
);
body.position.y = 110;
pumpGroup.add(body);

const motor = new THREE.Mesh(
new THREE.CylinderGeometry(30,30,80,32),
new THREE.MeshStandardMaterial({color:0x555555})
);
motor.rotation.z = Math.PI/2;
motor.position.set(90,110,0);
pumpGroup.add(motor);

pumpGroup.position.set(-300,0,0);
scene.add(pumpGroup);

// ---- Cooling Tower ----
const towerGroup = new THREE.Group();

const baseCT = new THREE.Mesh(
new THREE.BoxGeometry(250,40,250),
new THREE.MeshStandardMaterial({color:0x444444})
);
baseCT.position.y = 20;
towerGroup.add(baseCT);

const bodyCT = new THREE.Mesh(
new THREE.BoxGeometry(180,250,180),
new THREE.MeshStandardMaterial({color:0x666666})
);
bodyCT.position.y = 170;
towerGroup.add(bodyCT);

const roof = new THREE.Mesh(
new THREE.BoxGeometry(200,25,200),
new THREE.MeshStandardMaterial({color:0x333333})
);
roof.position.y = 310;
towerGroup.add(roof);

const fanGroup = new THREE.Group();

const fanBase = new THREE.Mesh(
new THREE.CylinderGeometry(70,70,15,32),
new THREE.MeshStandardMaterial({color:0x222222})
);
fanBase.position.y = 320;
fanGroup.add(fanBase);

for(let i=0;i<4;i++){
const blade = new THREE.Mesh(
new THREE.BoxGeometry(130,10,20),
new THREE.MeshStandardMaterial({color:0xffffff})
);
blade.position.y = 327;
blade.rotation.y = (Math.PI/2)*i;
fanGroup.add(blade);
}

towerGroup.add(fanGroup);
towerGroup.position.set(300,0,0);
scene.add(towerGroup);

// ---- Control Panel ----
const panel = new THREE.Mesh(
new THREE.BoxGeometry(120,180,80),
new THREE.MeshStandardMaterial({color:0x999999})
);
panel.position.set(-100,90,-200);
scene.add(panel);

// ==========================================
// =============== PIPING ==================
// ==========================================

// Tank → Pump
pipeHorizontal(-450,120,0,200);
valve(-450,120,0);

// Pump → CT
pipeHorizontal(0,120,0,600);
valve(0,120,0);

// Up to Cooling Tower
pipeVertical(300,250,0,250);

// Structure under pipe
structure(0,0);

// ==========================================
// =============== ANIMATE =================
// ==========================================
function animate(){
requestAnimationFrame(animate);
controls.update();
fanGroup.rotation.y += 0.08;
renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
