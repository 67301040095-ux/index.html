<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HVAC SCADA MODE</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial}
#panel{
position:absolute;
top:15px;
left:15px;
width:280px;
background:#111;
color:#0f0;
padding:15px;
border-radius:8px;
box-shadow:0 0 15px #000;
}
h3{margin-top:0;color:#0ff}
button{
margin:5px 0;
width:100%;
padding:8px;
}
.status{font-weight:bold}
.alarm{
color:red;
font-weight:bold;
}
</style>
</head>
<body>

<div id="panel">
<h3>HVAC SCADA</h3>

<div>CDP Status: <span id="cdpStat" class="status">STOP</span></div>
<div>CHP Status: <span id="chpStat" class="status">STOP</span></div>
<div>CT Fan: <span id="fanStat" class="status">RUN</span></div>
<hr>
<div>Condenser Temp: <span id="condTemp">35</span> °C</div>
<div>Chilled Temp: <span id="chillTemp">7</span> °C</div>
<div>Pressure: <span id="pressure">0</span> bar</div>
<hr>
<div id="alarmBox"></div>
<hr>
<button onclick="toggleCDP()">Toggle CDP</button>
<button onclick="toggleCHP()">Toggle CHP</button>
<button onclick="toggleFan()">Toggle CT Fan</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xbfdfff);

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,5000);
camera.position.set(1000,700,1000);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

scene.add(new THREE.AmbientLight(0xffffff,0.4));
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(600,900,600);
scene.add(light);

// Equipment
function box(x,z,w,h,d,color){
const m=new THREE.Mesh(
new THREE.BoxGeometry(w,h,d),
new THREE.MeshStandardMaterial({color})
);
m.position.set(x,h/2,z);
scene.add(m);
return m;
}

box(-1000,0,300,350,300,0x666666); // CT
box(0,0,400,250,250,0x999999); // CH
box(1200,0,350,250,250,0x777777); // AHU
box(-600,0,150,200,150,0xaa0000); // CDP
box(500,0,150,200,150,0x0033aa); // CHP

// Fan
const fan=new THREE.Mesh(
new THREE.CylinderGeometry(100,100,20,32),
new THREE.MeshStandardMaterial({color:0x222222})
);
fan.position.set(-1000,370,0);
scene.add(fan);

// Flow arrows
const arrows=[];
function flow(x,color){
const g=new THREE.ConeGeometry(20,60,16);
const m=new THREE.MeshStandardMaterial({color});
const mesh=new THREE.Mesh(g,m);
mesh.rotation.z=Math.PI/2;
mesh.position.set(x,200,0);
scene.add(mesh);
arrows.push(mesh);
}
flow(-300,0xff0000);
flow(300,0x0066ff);
flow(900,0x0066ff);

// States
let cdp=false;
let chp=false;
let fanOn=true;
let condTemp=35;
let chillTemp=7;
let pressure=0;

// UI Functions
function toggleCDP(){cdp=!cdp;}
function toggleCHP(){chp=!chp;}
function toggleFan(){fanOn=!fanOn;}

function updateUI(){
document.getElementById("cdpStat").innerText=cdp?"RUN":"STOP";
document.getElementById("chpStat").innerText=chp?"RUN":"STOP";
document.getElementById("fanStat").innerText=fanOn?"RUN":"STOP";
document.getElementById("condTemp").innerText=condTemp.toFixed(1);
document.getElementById("chillTemp").innerText=chillTemp.toFixed(1);
document.getElementById("pressure").innerText=pressure.toFixed(1);

let alarm="";
if(fanOn && !cdp) alarm="⚠ ALARM: Condenser Pump OFF!";
if(!chp && chillTemp>10) alarm="⚠ ALARM: No Chilled Flow!";
document.getElementById("alarmBox").innerHTML=
alarm?'<div class="alarm">'+alarm+'</div>':"";
}

// Animation
function animate(){
requestAnimationFrame(animate);
controls.update();

if(fanOn) fan.rotation.y+=0.08;

arrows.forEach(a=>{
if((a.material.color.getHex()==0xff0000 && cdp) ||
(a.material.color.getHex()==0x0066ff && chp)){
a.position.x+=5;
if(a.position.x>1300) a.position.x=-1100;
}
});

if(cdp){condTemp-=0.02; pressure=3;}
else{condTemp+=0.03; pressure=0;}

if(chp){chillTemp-=0.01;}
else{chillTemp+=0.02;}

updateUI();
renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
