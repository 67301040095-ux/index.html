<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Chiller System - Full</title>
<style>
body { margin:0; overflow:hidden; background:#1e2228; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ======================
// SCENE
// ======================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2228);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,5000);
camera.position.set(0,600,1200);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// ======================
// LIGHT
// ======================
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(500,800,400);
scene.add(light);

// ======================
// GROUND
// ======================
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(4000,4000),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ======================
// COOLING TOWER
// ======================
function createCoolingTower(x,z){
const group = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(200,300,200),
new THREE.MeshStandardMaterial({color:0xcfd2d6})
);
body.position.y = 150;
group.add(body);

const base = new THREE.Mesh(
new THREE.BoxGeometry(220,20,220),
new THREE.MeshStandardMaterial({color:0x555555})
);
base.position.y = 10;
group.add(base);

group.position.set(x,0,z);
scene.add(group);
}

// ======================
// CHILLER
// ======================
function createChiller(x,z){
const group = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(500,200,200),
new THREE.MeshStandardMaterial({color:0xdedede})
);
body.position.y = 120;
group.add(body);

for(let i=0;i<12;i++){
const grill = new THREE.Mesh(
new THREE.BoxGeometry(420,4,4),
new THREE.MeshStandardMaterial({color:0x888888})
);
grill.position.set(0,60+i*12,102);
group.add(grill);
}

group.position.set(x,0,z);
scene.add(group);
}

// ======================
// VERTICAL PUMP
// ======================
function createPump(x,z){
const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(120,15,120),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
base.position.y = 7;
group.add(base);

const body = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,120,32),
new THREE.MeshStandardMaterial({color:0x0077ff})
);
body.position.y = 80;
group.add(body);

const motor = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,70,32),
new THREE.MeshStandardMaterial({color:0x666666})
);
motor.position.y = 170;
group.add(motor);

group.position.set(x,0,z);
scene.add(group);
}

// ======================
// AHU
// ======================
function createAHU(x,z){
const group = new THREE.Group();

const body = new THREE.Mesh(
new THREE.BoxGeometry(350,180,180),
new THREE.MeshStandardMaterial({color:0xdedede})
);
body.position.y = 110;
group.add(body);

group.position.set(x,0,z);
scene.add(group);
}

// ======================
// EXPANSION TANK
// ======================
function createExpansionTank(x,z){
const tank = new THREE.Mesh(
new THREE.CylinderGeometry(60,60,200,32),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
);
tank.position.set(x,100,z);
scene.add(tank);
}

// ======================
// WATER STORAGE TANK
// ======================
function createWaterTank(x,z){
const tank = new THREE.Mesh(
new THREE.CylinderGeometry(150,150,300,32),
new THREE.MeshStandardMaterial({color:0xdddddd})
);
tank.position.set(x,150,z);
scene.add(tank);
}

// ======================
// ELECTRICAL PANEL
// ======================
function createPanel(x,z){
const panel = new THREE.Mesh(
new THREE.BoxGeometry(120,200,60),
new THREE.MeshStandardMaterial({color:0xbbbbbb})
);
panel.position.set(x,100,z);
scene.add(panel);
}

// ======================
// LAYOUT
// ======================

createCoolingTower(-800,-900);
createCoolingTower(800,-900);

createChiller(0,-300);

createPump(-600,400);
createPump(600,400);

createAHU(0,700);

createExpansionTank(-300,200);
createExpansionTank(300,200);

createWaterTank(0,1100);

createPanel(-900,0);
createPanel(900,0);

// ======================
function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
