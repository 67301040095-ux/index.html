<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Chiller System</title>
<style>
body { margin:0; overflow:hidden; background:#1e2228; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== Scene =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2228);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,3000);
camera.position.set(0,500,1000); // ถอยกล้องออกให้เห็นครบ

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// ===== Light =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(300,500,200);
scene.add(light);

// ===== Ground =====
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(2000,2000), // ขยายพื้นให้ใหญ่ขึ้น
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);


// ============================
// (ฟังก์ชันทั้งหมดของคุณเหมือนเดิม)
// ============================
// --- ตัดออกในคำตอบนี้เพื่อความสั้น ---
// ใช้ฟังก์ชัน createCoolingTower, createPump, createAHU เดิมของคุณได้เลย


// ===== Layout (จัดระยะใหม่ให้ไกลขึ้น) =====

createCoolingTower(-600,-400);  // ซ้ายหลัง ไกลขึ้น
createAHU(600,-400);            // ขวาหลัง ไกลขึ้น
createPump(-600,200);           // ซ้ายหน้า ไกลขึ้น
createPump(600,200);            // ขวาหน้า ไกลขึ้น


// ===== Animate =====
function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
