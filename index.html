<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Chiller System</title>

<style>
body{
margin:0;
overflow:hidden;
background:#1e2228;
font-family:Arial;
}

#panel{
position:absolute;
top:20px;
left:20px;
z-index:10;
}

button{
font-size:18px;
padding:8px 15px;
margin-right:10px;
}

#status{
position:absolute;
top:70px;
left:20px;
color:white;
font-size:18px;
background:#000000aa;
padding:10px;
border-radius:5px;
}
</style>
</head>

<body>

<div id="panel">
<button onclick="startAuto()">START</button>
<button onclick="stopAuto()">STOP</button>
</div>

<div id="status">SYSTEM READY</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// SCENE
const scene=new THREE.Scene()
scene.background=new THREE.Color(0x1e2228)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,3000)
camera.position.set(0,400,700)

const controls=new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true


// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,0.6))

const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(300,500,200)
scene.add(light)


// FLOOR
const ground=new THREE.Mesh(
new THREE.PlaneGeometry(2500,2000),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
)

ground.rotation.x=-Math.PI/2
scene.add(ground)


// VARIABLES
let pump1
let pump2
let coolingFan
let ahuFan

let pumpRun=false
let coolingRun=false
let chillerRun=false
let ahuRun=false

let startTime=null

const status=document.getElementById("status")


// COOLING TOWER
function createCoolingTower(x,z){

const group=new THREE.Group()

const tower=new THREE.Mesh(
new THREE.BoxGeometry(150,200,150),
new THREE.MeshStandardMaterial({color:0xcfd2d6})
)

tower.position.y=120
group.add(tower)

coolingFan=new THREE.Mesh(
new THREE.CylinderGeometry(45,45,10,32),
new THREE.MeshStandardMaterial({color:0x222222})
)

coolingFan.rotation.x=Math.PI/2
coolingFan.position.y=230

group.add(coolingFan)

group.position.set(x,0,z)
scene.add(group)

}


// PUMP
function createPump(x,z){

const group=new THREE.Group()

const body=new THREE.Mesh(
new THREE.CylinderGeometry(40,40,90,32),
new THREE.MeshStandardMaterial({color:0x0077ff})
)

body.position.y=70
group.add(body)

group.position.set(x,0,z)
scene.add(group)

return group

}


// AHU
function createAHU(x,z){

const group=new THREE.Group()

const body=new THREE.Mesh(
new THREE.BoxGeometry(220,140,120),
new THREE.MeshStandardMaterial({color:0xdedede})
)

body.position.y=130
group.add(body)

ahuFan=new THREE.Mesh(
new THREE.CylinderGeometry(40,40,20,32),
new THREE.MeshStandardMaterial({color:0x333333})
)

ahuFan.rotation.z=Math.PI/2
ahuFan.position.set(70,130,0)

group.add(ahuFan)

group.position.set(x,0,z)
scene.add(group)

}


// CHILLER
function createChiller(x,z){

const group=new THREE.Group()

const evap=new THREE.Mesh(
new THREE.CylinderGeometry(70,70,400,32),
new THREE.MeshStandardMaterial({color:0x0b3d2e})
)

evap.rotation.z=Math.PI/2
evap.position.set(0,80,0)

group.add(evap)

const cond=evap.clone()
cond.position.y=170

group.add(cond)

group.position.set(x,0,z)

scene.add(group)

}


// LAYOUT
createCoolingTower(-550,-300)
createAHU(550,-300)
createChiller(0,0)

pump1=createPump(-500,280)
pump2=createPump(500,280)


// AUTO SYSTEM
function startAuto(){

startTime=Date.now()

pumpRun=false
coolingRun=false
chillerRun=false
ahuRun=false

status.innerHTML="SYSTEM START"

}


function stopAuto(){

startTime=null

pumpRun=false
coolingRun=false
chillerRun=false
ahuRun=false

status.innerHTML="SYSTEM STOP"

}


// CONTROL LOGIC
function updateSystem(){

if(!startTime)return

let t=(Date.now()-startTime)/1000


if(t>3 && !pumpRun){

pumpRun=true
status.innerHTML="PUMP RUNNING"

}


if(t>8 && !coolingRun){

coolingRun=true
status.innerHTML="COOLING TOWER FAN RUN"

}


if(t>13 && !chillerRun){

chillerRun=true
status.innerHTML="CHILLER RUN"

}


if(t>16 && !ahuRun){

ahuRun=true
status.innerHTML="AHU FAN RUN"

}

}


// ANIMATION
function animate(){

requestAnimationFrame(animate)

controls.update()

updateSystem()


if(pumpRun){

pump1.rotation.y+=0.05
pump2.rotation.y+=0.05

}


if(coolingRun){

coolingFan.rotation.z+=0.2

}


if(ahuRun){

ahuFan.rotation.y+=0.2

}


renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
