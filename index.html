<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Chiller System</title>
<style>
body { margin:0; overflow:hidden; background:#1e2228; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== Scene =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2228);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,3000);
camera.position.set(0,400,700);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// ===== Light =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(300,500,200);
scene.add(light);

// ===== Ground =====
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(1200,800),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);


// ============================
// COOLING TOWER (ของเดิมคุณ)
// ============================

function createCoolingTower(x,z){

const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(200,20,200),
new THREE.MeshStandardMaterial({color:0x555555})
);
base.position.y = 10;
group.add(base);

const tower = new THREE.Mesh(
new THREE.BoxGeometry(150,200,150),
new THREE.MeshStandardMaterial({color:0xcfd2d6})
);
tower.position.y = 120;
group.add(tower);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ============================
// VERTICAL PUMP (ของเดิมคุณ)
// ============================

function createPump(x,z){

const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(120,15,120),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
base.position.y = 7.5;
group.add(base);

const body = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,90,32),
new THREE.MeshStandardMaterial({color:0x0077ff})
);
body.position.y = 70;
group.add(body);

group.position.set(x,0,z);
scene.add(group);
return group;
}


// ============================
// AHU (ของเดิมคุณ)
// ============================

function createAHU(x,z){

const box = new THREE.Mesh(
new THREE.BoxGeometry(200,120,120),
new THREE.MeshStandardMaterial({color:0xddddcc})
);
box.position.set(x,60,z);
scene.add(box);
return box;
}


// ============================
// CHILLER (เพิ่มใหม่อย่างเดียว)
// ============================
function createChiller(x,z){

const group = new THREE.Group();

const bodyColor = 0x0f3b2e;
const metal = 0x2a2a2a;
const metalLight = 0x888888;

// BASE
const base = new THREE.Mesh(
new THREE.BoxGeometry(700,40,260),
new THREE.MeshStandardMaterial({color:0x444444})
);
base.position.y = 20;
group.add(base);

// EVAPORATOR
const evap = new THREE.Mesh(
new THREE.CylinderGeometry(120,120,550,64),
new THREE.MeshStandardMaterial({color:bodyColor})
);
evap.rotation.z = Math.PI/2;
evap.position.y = 170;
group.add(evap);

// CONDENSER
const cond = new THREE.Mesh(
new THREE.CylinderGeometry(120,120,550,64),
new THREE.MeshStandardMaterial({color:bodyColor})
);
cond.rotation.z = Math.PI/2;
cond.position.y = 360;
group.add(cond);

// END CAPS
const capGeo = new THREE.CylinderGeometry(130,130,40,64);

[-275,275].forEach(xPos=>{
let cap1 = new THREE.Mesh(capGeo,new THREE.MeshStandardMaterial({color:metal}));
cap1.rotation.z = Math.PI/2;
cap1.position.set(xPos,170,0);
group.add(cap1);

let cap2 = cap1.clone();
cap2.position.y = 360;
group.add(cap2);
});

// COMPRESSOR
const volute = new THREE.Mesh(
new THREE.TorusGeometry(110,40,32,120,Math.PI*1.6),
new THREE.MeshStandardMaterial({color:metal})
);
volute.rotation.y = Math.PI/2;
volute.position.set(0,520,0);
group.add(volute);

const motor = new THREE.Mesh(
new THREE.CylinderGeometry(70,70,220,32),
new THREE.MeshStandardMaterial({color:metalLight})
);
motor.rotation.z = Math.PI/2;
motor.position.set(200,520,0);
group.add(motor);

// CONTROL PANEL
const panel = new THREE.Mesh(
new THREE.BoxGeometry(120,260,70),
new THREE.MeshStandardMaterial({color:0x1c4f3b})
);
panel.position.set(-380,260,170);
group.add(panel);

const screen = new THREE.Mesh(
new THREE.BoxGeometry(60,40,5),
new THREE.MeshStandardMaterial({color:0x00ffaa})
);
screen.position.set(-380,320,206);
group.add(screen);

// PIPES
const pipeGeo = new THREE.CylinderGeometry(40,40,220,32);
const pipeMat = new THREE.MeshStandardMaterial({color:metalLight});

let pipe1 = new THREE.Mesh(pipeGeo,pipeMat);
pipe1.rotation.z = Math.PI/2;
pipe1.position.set(-360,170,0);
group.add(pipe1);

let pipe2 = pipe1.clone();
pipe2.position.x = 360;
group.add(pipe2);

// ตำแหน่งเดิม
group.position.set(x,0,z);

// 🔻 แก้เฉพาะขนาด (ย่อเหลือ 55%)
group.scale.set(0.55,0.55,0.55);

scene.add(group);
return group;
}

// ===== Layout =====

createCoolingTower(-300,-200);
createChiller(0,-100);
createAHU(300,-200);
createPump(-300,0);
createPump(300,0);


// ===== Animate =====
function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
