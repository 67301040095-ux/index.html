<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>CHILLER SYSTEM 3D LAYOUT</title>

<style>

body{
margin:0;
overflow:hidden;
background:#111;
}

</style>

</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

// CAMERA
const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
2000
);

camera.position.set(8,6,12);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLS (360°)
const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;


// LIGHT
const ambient = new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambient);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);


// GROUND
const ground = new THREE.Mesh(

new THREE.PlaneGeometry(30,30),

new THREE.MeshStandardMaterial({
color:0x555555
})

);

ground.rotation.x = -Math.PI/2;
scene.add(ground);


// MACHINE FUNCTION
function createMachine(x,y,z,color){

const geo = new THREE.BoxGeometry(2,1,2);

const mat = new THREE.MeshStandardMaterial({
color:color
});

const mesh = new THREE.Mesh(geo,mat);

mesh.position.set(x,y,z);

scene.add(mesh);

}


// LAYOUT

createMachine(0,0,0,0x00ffff);   // CT
createMachine(0,0,-3,0x00ff00);  // CDP
createMachine(0,0,-6,0xffff00);  // CH
createMachine(0,0,-9,0xff8800);  // CHP
createMachine(0,0,-12,0xff0000); // AHU



// ANIMATION
function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
