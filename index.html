<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CHILLER SYSTEM 3D</title>

<style>
body{
margin:0;
overflow:hidden;
background:#1a1a1a;
}

#ui{
position:absolute;
top:20px;
left:20px;
}

button{
padding:10px 20px;
font-size:16px;
margin-right:10px;
cursor:pointer;
}
</style>

</head>
<body>

<div id="ui">
<button onclick="startSystem()">START</button>
<button onclick="stopSystem()">STOP</button>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

let systemRun=false
let water=[]

// scene
const scene=new THREE.Scene()
scene.background=new THREE.Color(0x1a1a1a)

// camera
const camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(10,6,14)

// renderer
const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

// control
const controls=new THREE.OrbitControls(camera,renderer.domElement)

// light
const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(10,20,10)
scene.add(light)

scene.add(new THREE.AmbientLight(0xffffff,0.6))

// ground
const ground=new THREE.Mesh(
new THREE.PlaneGeometry(40,40),
new THREE.MeshStandardMaterial({color:0x444444})
)

ground.rotation.x=-Math.PI/2
scene.add(ground)


// COOLING TOWER
const CT=new THREE.Mesh(
new THREE.BoxGeometry(3,5,3),
new THREE.MeshStandardMaterial({color:0xdddddd})
)

CT.position.set(0,2.5,10)
scene.add(CT)


// fan
const fan=new THREE.Mesh(
new THREE.CylinderGeometry(1.3,1.3,0.1,32),
new THREE.MeshStandardMaterial({color:0x222222})
)

fan.rotation.x=Math.PI/2
fan.position.set(0,4,10)
scene.add(fan)


// pump
const pumpMaterial=new THREE.MeshStandardMaterial({color:0x222222})

const pump1=new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.7,2,32),
pumpMaterial
)

pump1.position.set(1,1,6)
scene.add(pump1)

const pump2=new THREE.Mesh(
new THREE.CylinderGeometry(0.7,0.7,2,32),
pumpMaterial
)

pump2.position.set(1,1,-6)
scene.add(pump2)


 //BASE
const base = new THREE.Mesh(
 new THREE.BoxGeometry(8,0.5,4),
 new THREE.MeshStandardMaterial({color:0x777777})
)
base.position.set(0,0.25,0)
scene.add(base)


// CHILLER BODY
const chillerBody = new THREE.Mesh(
 new THREE.CylinderGeometry(1.2,1.2,6,32),
 new THREE.MeshStandardMaterial({color:0x1f7a6b})
)

chillerBody.rotation.x = Math.PI/2
chillerBody.position.set(0,1.5,0)
scene.add(chillerBody)


// TOP PIPE
const topPipe = new THREE.Mesh(
 new THREE.CylinderGeometry(0.8,0.8,2,32),
 new THREE.MeshStandardMaterial({color:0x1f7a6b})
)

topPipe.position.set(0,3,0)
scene.add(topPipe)


// CONTROL BOX
const controlBox = new THREE.Mesh(
 new THREE.BoxGeometry(1,2,1),
 new THREE.MeshStandardMaterial({color:0x222222})
)

controlBox.position.set(3,1,0)
scene.add(controlBox)


// SCREEN
const screen = new THREE.Mesh(
 new THREE.BoxGeometry(0.6,0.4,0.1),
 new THREE.MeshStandardMaterial({color:0x00ffff})
)

screen.position.set(3,1.5,0.55)
scene.add(screen)

// AHU
const ahu=new THREE.Mesh(
new THREE.BoxGeometry(3,1.5,2),
new THREE.MeshStandardMaterial({color:0xff4444})
)

ahu.position.set(0,1,-10)
scene.add(ahu)


// PIPE
function pipe(x,z1,z2,color){

const len=Math.abs(z2-z1)

const p=new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,len,16),
new THREE.MeshStandardMaterial({color:color})
)

p.rotation.x=Math.PI/2
p.position.set(x,1,(z1+z2)/2)

scene.add(p)
}

pipe(-1,10,6,0xff0000)
pipe(-1,6,0,0xff0000)
pipe(-1,0,-6,0xff0000)
pipe(-1,-6,-10,0xff0000)

pipe(1,-10,-6,0x00ffff)
pipe(1,-6,0,0x00ffff)
pipe(1,0,6,0x00ffff)
pipe(1,6,10,0x00ffff)


// WATER
function createWater(x,z){

const w=new THREE.Mesh(
new THREE.SphereGeometry(0.3,16,16),
new THREE.MeshStandardMaterial({color:0x00ffff})
)

w.position.set(x,1,z)

scene.add(w)

water.push(w)

}

createWater(-1,9)
createWater(-1,5)
createWater(-1,1)
createWater(-1,-3)
createWater(-1,-7)

createWater(1,-9)
createWater(1,-5)
createWater(1,-1)
createWater(1,3)
createWater(1,7)


// CONTROL
function startSystem(){

systemRun=true
pumpMaterial.color.set(0x00ff00)

}

function stopSystem(){

systemRun=false
pumpMaterial.color.set(0x222222)

}


// ANIMATE
function animate(){

requestAnimationFrame(animate)

controls.update()

if(systemRun){

fan.rotation.z+=0.4

for(let i=0;i<water.length;i++){

if(i<5){

water[i].position.z+=0.05

if(water[i].position.z>10){
water[i].position.z=-10
}

}else{

water[i].position.z-=0.05

if(water[i].position.z<-10){
water[i].position.z=10
}

}

}

}

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
