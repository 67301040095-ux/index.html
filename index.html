<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Chiller System</title>

<style>
body{
margin:0;
overflow:hidden;
background:#1e2228;
}

#ui{
position:absolute;
top:20px;
left:20px;
z-index:10;
}

#status{
color:white;
margin-top:10px;
font-family:Arial;
font-size:18px;
}
</style>
</head>

<body>

<div id="ui">
<button onclick="startAuto()">START</button>
<button onclick="stopAuto()">STOP</button>
<div id="status">SYSTEM READY</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ====================
// SCENE
// ====================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2228);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
3000
);

camera.position.set(0,400,700);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;


// ====================
// LIGHT
// ====================

scene.add(new THREE.AmbientLight(0xffffff,0.6));

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(300,500,200);
scene.add(light);


// ====================
// GROUND
// ====================

const ground = new THREE.Mesh(
new THREE.PlaneGeometry(2500,2000),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);

ground.rotation.x = -Math.PI/2;
scene.add(ground);


// ====================
// COOLING TOWER
// ====================

function createCoolingTower(x,z){

const tower = new THREE.Mesh(
new THREE.BoxGeometry(150,200,150),
new THREE.MeshStandardMaterial({color:0xcfd2d6})
);

tower.position.set(x,100,z);
scene.add(tower);

}


// ====================
// PUMP
// ====================

function createPump(x,z){

const pump = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,90,32),
new THREE.MeshStandardMaterial({color:0x0077ff})
);

pump.position.set(x,45,z);
scene.add(pump);

}


// ====================
// AHU
// ====================

function createAHU(x,z){

const ahu = new THREE.Mesh(
new THREE.BoxGeometry(220,140,120),
new THREE.MeshStandardMaterial({color:0xdedede})
);

ahu.position.set(x,70,z);
scene.add(ahu);

}


// ====================
// CHILLER
// ====================

function createChiller(x,z){

const chiller = new THREE.Mesh(
new THREE.CylinderGeometry(70,70,400,32),
new THREE.MeshStandardMaterial({color:0x0b3d2e})
);

chiller.rotation.z = Math.PI/2;
chiller.position.set(x,80,z);
scene.add(chiller);

}


// ====================
// LAYOUT
// ====================

createCoolingTower(-550,-300);
createAHU(550,-300);

createChiller(0,0);

createPump(-500,280);
createPump(500,280);


// ====================
// AUTO SYSTEM
// ====================

let startTime = null;

function startAuto(){

startTime = Date.now();

document.getElementById("status").innerHTML="SYSTEM START";

console.log("SYSTEM START");

}

function stopAuto(){

startTime = null;

document.getElementById("status").innerHTML="SYSTEM STOP";

console.log("SYSTEM STOP");

}


function updateSystem(){

if(!startTime) return;

let t = (Date.now() - startTime)/1000;


// 3 วิ ปั้ม
if(t>3){
document.getElementById("status").innerHTML="PUMP RUN";
}


// 8 วิ Cooling Tower
if(t>8){
document.getElementById("status").innerHTML="COOLING TOWER FAN RUN";
}


// 13 วิ Chiller
if(t>13){
document.getElementById("status").innerHTML="CHILLER RUN";
}


// 16 วิ AHU
if(t>16){
document.getElementById("status").innerHTML="AHU RUN";
}

}


// ====================
// ANIMATE
// ====================

function animate(){

requestAnimationFrame(animate);

controls.update();

updateSystem();

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
