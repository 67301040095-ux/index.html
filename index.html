<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HVAC Interactive</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial}
#ui{
position:absolute;
top:20px;
left:20px;
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
button{margin:5px;padding:8px 12px;}
</style>
</head>
<body>

<div id="ui">
<button onclick="toggleCDP()">Toggle CDP</button>
<button onclick="toggleCHP()">Toggle CHP</button>
<button onclick="toggleFan()">Toggle CT Fan</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xbfdfff);

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,5000);
camera.position.set(1000,700,1000);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

scene.add(new THREE.AmbientLight(0xffffff,0.4));
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(600,900,600);
scene.add(light);

const ground=new THREE.Mesh(
new THREE.PlaneGeometry(6000,6000),
new THREE.MeshStandardMaterial({color:0xdddddd})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ----- EQUIPMENT -----
function box(x,z,w,h,d,color){
const m=new THREE.Mesh(
new THREE.BoxGeometry(w,h,d),
new THREE.MeshStandardMaterial({color})
);
m.position.set(x,h/2,z);
scene.add(m);
return m;
}

const CT=box(-1000,0,300,350,300,0x666666);
const CH=box(0,0,400,250,250,0x999999);
const AHU=box(1200,0,350,250,250,0x777777);

const CDP=box(-600,0,150,200,150,0xaa0000);
const CHP=box(500,0,150,200,150,0x0033aa);

// ----- FAN -----
const fanGroup=new THREE.Group();
const base=new THREE.Mesh(
new THREE.CylinderGeometry(100,100,20,32),
new THREE.MeshStandardMaterial({color:0x222222})
);
base.position.y=370;
fanGroup.add(base);

for(let i=0;i<4;i++){
const blade=new THREE.Mesh(
new THREE.BoxGeometry(200,15,30),
new THREE.MeshStandardMaterial({color:0xffffff})
);
blade.position.y=380;
blade.rotation.y=i*(Math.PI/2);
fanGroup.add(blade);
}
fanGroup.position.set(-1000,0,0);
scene.add(fanGroup);

// ----- FLOW ARROWS -----
const arrows=[];
function createFlow(x,y,z,color){
const g=new THREE.ConeGeometry(20,60,16);
const m=new THREE.MeshStandardMaterial({color});
const mesh=new THREE.Mesh(g,m);
mesh.rotation.z=Math.PI/2;
mesh.position.set(x,y,z);
scene.add(mesh);
arrows.push(mesh);
}
createFlow(-300,200,0,0xff0000);
createFlow(300,200,0,0x0066ff);
createFlow(900,200,0,0x0066ff);

let cdpOn=false;
let chpOn=false;
let fanOn=true;

function toggleCDP(){cdpOn=!cdpOn;}
function toggleCHP(){chpOn=!chpOn;}
function toggleFan(){fanOn=!fanOn;}

// ----- ANIMATION -----
function animate(){
requestAnimationFrame(animate);
controls.update();

if(fanOn) fanGroup.rotation.y+=0.08;

arrows.forEach(a=>{
if((a.material.color.getHex()==0xff0000 && cdpOn) ||
(a.material.color.getHex()==0x0066ff && chpOn)){
a.position.x+=5;
if(a.position.x>1300) a.position.x=-1100;
}
});

renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
