<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Plant System</title>
<style>
body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbfdfff);

// ================= CAMERA =================
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
);
camera.position.set(600,400,600);

// ================= RENDERER =================
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= CONTROLS (360° หมุนได้) =================
const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// ================= LIGHT =================
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(500,800,500);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,0.4);
scene.add(ambient);

// ================= GROUND =================
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(3000,3000),
new THREE.MeshStandardMaterial({color:0xdddddd})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// =====================================================
// ================== PUMP (แนวตั้ง) ===================
// =====================================================
function createPump(x,z){
const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.CylinderGeometry(60,60,40,32),
new THREE.MeshStandardMaterial({color:0x333333})
);
base.position.y = 20;
group.add(base);

const body = new THREE.Mesh(
new THREE.CylinderGeometry(35,35,140,32),
new THREE.MeshStandardMaterial({color:0x0066cc})
);
body.position.y = 110;
group.add(body);

const motor = new THREE.Mesh(
new THREE.CylinderGeometry(30,30,80,32),
new THREE.MeshStandardMaterial({color:0x555555})
);
motor.rotation.z = Math.PI/2;
motor.position.set(90,110,0);
group.add(motor);

group.position.set(x,0,z);
scene.add(group);
}

// =====================================================
// ====================== TANK ==========================
// =====================================================
function createTank(x,z){
const tank = new THREE.Mesh(
new THREE.CylinderGeometry(120,120,250,32),
new THREE.MeshStandardMaterial({color:0xaaaaaa})
);
tank.position.set(x,125,z);
scene.add(tank);
}

// =====================================================
// ======================= PIPE =========================
// =====================================================
function createPipe(x,z,length,rotateY=0){
const pipe = new THREE.Mesh(
new THREE.CylinderGeometry(15,15,length,16),
new THREE.MeshStandardMaterial({color:0x888888})
);
pipe.rotation.z = Math.PI/2;
pipe.rotation.y = rotateY;
pipe.position.set(x,120,z);
scene.add(pipe);
}

// =====================================================
// ================= COOLING TOWER ======================
// =====================================================
function createCoolingTower(x,z){

const group = new THREE.Group();

// base
const base = new THREE.Mesh(
new THREE.BoxGeometry(220,40,220),
new THREE.MeshStandardMaterial({color:0x444444})
);
base.position.y = 20;
group.add(base);

// body
const body = new THREE.Mesh(
new THREE.BoxGeometry(170,220,170),
new THREE.MeshStandardMaterial({color:0x666666})
);
body.position.y = 150;
group.add(body);

// roof vent
for(let i=0;i<4;i++){
const vent = new THREE.Mesh(
new THREE.BoxGeometry(150,25,12),
new THREE.MeshStandardMaterial({color:0x999999})
);
vent.position.y = 250;

if(i===0) vent.position.z=85;
if(i===1) vent.position.z=-85;
if(i===2){ vent.rotation.y=Math.PI/2; vent.position.x=85; }
if(i===3){ vent.rotation.y=Math.PI/2; vent.position.x=-85; }

group.add(vent);
}

// roof
const roof = new THREE.Mesh(
new THREE.BoxGeometry(190,25,190),
new THREE.MeshStandardMaterial({color:0x333333})
);
roof.position.y = 275;
group.add(roof);

// fan
const fanGroup = new THREE.Group();

const fanBase = new THREE.Mesh(
new THREE.CylinderGeometry(65,65,15,32),
new THREE.MeshStandardMaterial({color:0x222222})
);
fanBase.position.y = 285;
fanGroup.add(fanBase);

for(let i=0;i<4;i++){
const blade = new THREE.Mesh(
new THREE.BoxGeometry(120,8,18),
new THREE.MeshStandardMaterial({color:0xcccccc})
);
blade.position.y = 292;
blade.rotation.y = (Math.PI/2)*i;
fanGroup.add(blade);
}

group.add(fanGroup);

group.position.set(x,0,z);
scene.add(group);

return fanGroup;
}

// =====================================================
// ================= CREATE ALL EQUIPMENT ===============
// =====================================================

createTank(-400,0);
createPump(-150,0);
createPipe(-280,0,250);
createCoolingTower(250,0);

const fan = createCoolingTower(600,0); // อีกตัวให้เห็นหลายตัว

// =====================================================
// ================= ANIMATE ============================
// =====================================================
function animate(){
requestAnimationFrame(animate);
controls.update();
fan.rotation.y += 0.1;
renderer.render(scene,camera);
}
animate();

// resize
window.addEventListener('resize',()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
