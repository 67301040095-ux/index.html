<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Chiller System</title>
<style>
body { margin:0; overflow:hidden; background:#1e2228; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

// ===== Scene =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1e2228);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,3000);
camera.position.set(0,400,700);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// ===== Light =====
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(300,500,200);
scene.add(light);

// ===== Ground =====
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(1200,800),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);


// ============================
// CREATE AHU (NEW DESIGN)
// ============================

function createAHU(x,z){

const group = new THREE.Group();

// ===== Base C-Channel =====
const base = new THREE.Mesh(
new THREE.BoxGeometry(320,15,150),
new THREE.MeshStandardMaterial({color:0x333333})
);
base.position.y = 7.5;
group.add(base);

// ===== Main Body =====
const body = new THREE.Mesh(
new THREE.BoxGeometry(300,140,130),
new THREE.MeshStandardMaterial({color:0xddddcc})
);
body.position.y = 85;
group.add(body);

// ===== Panel Lines (แบ่ง 3 ตอน) =====
const panelMat = new THREE.MeshStandardMaterial({color:0x999999});

const divider1 = new THREE.Mesh(
new THREE.BoxGeometry(4,140,132),
panelMat
);
divider1.position.set(-80,85,0);
group.add(divider1);

const divider2 = divider1.clone();
divider2.position.x = 40;
group.add(divider2);

// ===== Side Opening (Fan Section) =====
const opening = new THREE.Mesh(
new THREE.BoxGeometry(4,90,90),
new THREE.MeshStandardMaterial({color:0x222222})
);
opening.position.set(148,95,0);
group.add(opening);

// ===== Fan Inside =====
const fanGroup = new THREE.Group();

const ring = new THREE.Mesh(
new THREE.RingGeometry(30,45,32),
new THREE.MeshStandardMaterial({color:0x111111, side:THREE.DoubleSide})
);
ring.rotation.y = Math.PI/2;
fanGroup.add(ring);

const bladeGeo = new THREE.BoxGeometry(8,3,70);
const bladeMat = new THREE.MeshStandardMaterial({color:0x111111});

for(let i=0;i<4;i++){
const blade = new THREE.Mesh(bladeGeo,bladeMat);
blade.rotation.x = Math.PI/2 * i;
fanGroup.add(blade);
}

fanGroup.position.set(120,95,0);
group.add(fanGroup);

group.position.set(x,0,z);
scene.add(group);

return group;
}


// ============================
// CREATE COOLING TOWER
// ============================

function createCoolingTower(x,z){

const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(200,20,200),
new THREE.MeshStandardMaterial({color:0x555555})
);
base.position.y = 10;
group.add(base);

const tower = new THREE.Mesh(
new THREE.BoxGeometry(150,200,150),
new THREE.MeshStandardMaterial({color:0xcfd2d6})
);
tower.position.y = 120;
group.add(tower);

group.position.set(x,0,z);
scene.add(group);

return group;
}


// ============================
// CREATE BOX (CH)
// ============================

function createBox(x,z,color,height=120,width=120,depth=120){
const box = new THREE.Mesh(
new THREE.BoxGeometry(width,height,depth),
new THREE.MeshStandardMaterial({color:color})
);
box.position.set(x,height/2,z);
scene.add(box);
return box;
}


// ============================
// CREATE VERTICAL PUMP
// ============================

function createPump(x,z){

const group = new THREE.Group();

const base = new THREE.Mesh(
new THREE.BoxGeometry(120,15,120),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);
base.position.y = 7.5;
group.add(base);

const body = new THREE.Mesh(
new THREE.CylinderGeometry(40,40,90,32),
new THREE.MeshStandardMaterial({color:0x0077ff})
);
body.position.y = 70;
group.add(body);

group.position.set(x,0,z);
scene.add(group);

return group;
}


// ===== Layout =====

const CT = createCoolingTower(-300,-200);
const CH = createBox(0,-100,0x888888,160,160,160);
const AHU = createAHU(300,-200);   // <<< ใช้ AHU ใหม่

const CDP = createPump(-300,0);
const CHP = createPump(300,0);


// ===== Animate =====
function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
