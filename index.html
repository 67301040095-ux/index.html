<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HVAC FULL INDUSTRIAL SIM</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:#111;color:#0f0}
#panel{
position:absolute;top:10px;left:10px;width:320px;
background:#000;padding:15px;border-radius:8px;
}
button{width:100%;margin:5px 0;padding:8px;}
.alarm{color:red;font-weight:bold}
canvas{background:#222;margin-top:10px}
</style>
</head>
<body>

<div id="panel">
<h3>HVAC INDUSTRIAL SIM</h3>

Mode: <span id="mode">MANUAL</span><br>
CDP: <span id="cdpStat">STOP</span><br>
CHP: <span id="chpStat">STOP</span><br>
Fan: <span id="fanStat">RUN</span><br>
<hr>
Cond Temp: <span id="condTemp">35</span> °C<br>
Chill Temp: <span id="chillTemp">7</span> °C<br>
Pressure: <span id="pressure">0</span> bar<br>
<hr>
<div id="alarmBox"></div>
<hr>

<button onclick="toggleMode()">Toggle AUTO/MANUAL</button>
<button onclick="toggleCDP()">Toggle CDP</button>
<button onclick="toggleCHP()">Toggle CHP</button>
<button onclick="toggleFan()">Toggle Fan</button>
<button onclick="simulateFault()">Simulate Fault</button>
<button onclick="resetAlarm()">Reset Alarm</button>

<canvas id="trend" width="280" height="150"></canvas>
</div>

<script>

let mode="MANUAL";
let cdp=false;
let chp=false;
let fanOn=true;
let condTemp=35;
let chillTemp=7;
let pressure=0;
let alarm="";
let fault=false;

// SOUND
const audio=new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

function toggleMode(){
mode=mode==="MANUAL"?"AUTO":"MANUAL";
}
function toggleCDP(){ if(mode==="MANUAL") cdp=!cdp; }
function toggleCHP(){ if(mode==="MANUAL") chp=!chp; }
function toggleFan(){ if(mode==="MANUAL") fanOn=!fanOn; }

function simulateFault(){
fault=true;
condTemp=60;
}

function resetAlarm(){
alarm="";
fault=false;
audio.pause();
audio.currentTime=0;
}

// AUTO LOGIC
function autoControl(){
if(mode==="AUTO"){
cdp=true;
chp=true;
fanOn=true;
}
}

// PROCESS SIMULATION
function process(){
if(cdp){
condTemp-=0.05;
pressure=3;
}else{
condTemp+=0.08;
pressure=0;
}

if(chp){
chillTemp-=0.02;
}else{
chillTemp+=0.05;
}

// Interlock logic
if(condTemp>50){
alarm="⚠ HIGH PRESSURE TRIP";
cdp=false;
fanOn=false;
audio.play();
}

if(chillTemp<3){
alarm="⚠ LOW TEMP TRIP";
chp=false;
audio.play();
}

if(fault){
alarm="⚠ SYSTEM FAULT";
audio.play();
}
}

// UI UPDATE
function updateUI(){
document.getElementById("mode").innerText=mode;
document.getElementById("cdpStat").innerText=cdp?"RUN":"STOP";
document.getElementById("chpStat").innerText=chp?"RUN":"STOP";
document.getElementById("fanStat").innerText=fanOn?"RUN":"STOP";
document.getElementById("condTemp").innerText=condTemp.toFixed(1);
document.getElementById("chillTemp").innerText=chillTemp.toFixed(1);
document.getElementById("pressure").innerText=pressure.toFixed(1);
document.getElementById("alarmBox").innerHTML=
alarm?'<div class="alarm">'+alarm+'</div>':"";
}

// TREND GRAPH
const ctx=document.getElementById("trend").getContext("2d");
const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[
{label:"Cond Temp",data:[],borderColor:"red"},
{label:"Chill Temp",data:[],borderColor:"cyan"}
]
},
options:{responsive:false,animation:false}
});

function updateTrend(){
if(chart.data.labels.length>20){
chart.data.labels.shift();
chart.data.datasets[0].data.shift();
chart.data.datasets[1].data.shift();
}
chart.data.labels.push("");
chart.data.datasets[0].data.push(condTemp);
chart.data.datasets[1].data.push(chillTemp);
chart.update();
}

// MAIN LOOP
function loop(){
autoControl();
process();
updateUI();
updateTrend();
requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
